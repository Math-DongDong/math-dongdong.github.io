<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동동쌤's 웹 앱</title>

    <!-- 모바일 및 반응형 웹을 위한 Bootstrap 5 CSS 적용 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons 적용 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- 우리가 따로 작성한 커스텀 CSS 스타일 적용 -->
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css');

        /* 폰트 및 전역 설정 */
        body {
            font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', sans-serif;
            background-color: #ffffff;
            color: #1e293b;
        }

        /* 메인 화면 전용 디자인 */

        /* 페이지 제목 스타일 (남색 계열 적용) */
        .page-title {
            color: #2c3e50;
            font-weight: 800;
            margin-bottom: 0.75rem;
            font-size: 2.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            letter-spacing: -0.02em;
        }

        .page-title i {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-top: 0.2rem;
        }

        /* 페이지 소제목 스타일 (회색 계열 적용) */
        .page-subtitle {
            color: #64748b;
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: -0.01em;
        }

        /* 카드 테두리와 부드러운 그림자 효과 설정 */
        .card {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            transition: transform 0.2s, box-shadow 0.2s;
            background-color: #ffffff;
            overflow: hidden;
            text-decoration: none !important;
        }

        /* 카드에 마우스를 올렸을 때(hover) 살짝 떠오르는 효과 */
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        }

        /* 카드 이미지 비율 및 크기 조정 */
        .img-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 1rem;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* 카드 내부 여백 조정 */
        .card-body {
            padding: 0 1.25rem 1.5rem 1.25rem;
        }

        /* 카드 하단 텍스트 */
        .card-text-custom {
            color: #334155;
            font-size: 1.05rem;
            margin-top: 0.5rem;
        }

        .card:hover .card-text-custom {
            color: #0f172a;
        }
    </style>
</head>

<body>

    <!-- 페이지 전체를 감싸는 컨테이너 -->
    <div class="container py-5">

        <!-- 헤더 영역 (제목 및 설명) -->
        <header class="text-center mb-5">
            <h1 class="page-title">동동쌤's 웹 앱</h1>
            <p class="page-subtitle">원하는 주제를 선택하여 바로 이동해보세요!</p>
        </header>

        <!-- 카드 영역 (가로로 4개 배치, 화면이 작아지면 2개, 1개로 줄어듦) -->
        <!-- row: 행 시작 / g-4: 카드 사이의 간격(gap) -->
        <div class="row g-4">

            <!-- 첫 번째 카드: 중학 수학 -->
            <!-- col-md-6: 태블릿에서는 한 줄에 2개, col-lg-3: 데스크탑에서는 한 줄에 4개 -->
            <div class="col-12 col-md-6 col-lg-3">
                <a href="./pages/middleschool/game/pig_game.html" class="card h-100 text-decoration-none">
                    <!-- 💡 이미지 경로: ./assets/images/mainPage/중학수학.jpg -->
                    <div class="img-container">
                        <img src="./assets/images/mainPage/중학수학.jpg" class="card-img-top" alt="중학 수학"
                            onerror="this.src='https://via.placeholder.com/300?text=(이미지 준비 중)'">
                    </div>
                    <div class="card-body d-flex flex-column justify-content-end">
                        <div class="card-text-custom text-center fw-bold">중학 수학</div>
                    </div>
                </a>
            </div>

            <!-- 두 번째 카드: 인공지능 수학 -->
            <div class="col-12 col-md-6 col-lg-3">
                <a href="./pages/aimath/color.html" class="card h-100 text-decoration-none">
                    <!-- 💡 이미지 경로: ./assets/images/mainPage/인공지능수학.jpg -->
                    <div class="img-container">
                        <img src="./assets/images/mainPage/인공지능수학.jpg" class="card-img-top" alt="인공지능 수학"
                            onerror="this.src='https://via.placeholder.com/300?text=(이미지 준비 중)'">
                    </div>
                    <div class="card-body d-flex flex-column justify-content-end">
                        <div class="card-text-custom text-center fw-bold">인공지능 수학</div>
                    </div>
                </a>
            </div>

            <!-- 세 번째 카드: 산업 수학 -->
            <div class="col-12 col-md-6 col-lg-3">
                <a href="https://industrialmath.streamlit.app/" class="card h-100 text-decoration-none">
                    <!-- 💡 이미지 경로: ./assets/images/mainPage/산업수학.jpg -->
                    <div class="img-container">
                        <img src="./assets/images/mainPage/산업수학.jpg" class="card-img-top" alt="산업 수학"
                            onerror="this.src='https://via.placeholder.com/300?text=(이미지 준비 중)'">
                    </div>
                    <div class="card-body d-flex flex-column justify-content-end">
                        <div class="card-text-custom text-center fw-bold">산업 수학</div>
                    </div>
                </a>
            </div>

            <!-- 네 번째 카드: 업무자동화 -->
            <div class="col-12 col-md-6 col-lg-3">
                <a href="https://dongdongbot.streamlit.app/" class="card h-100 text-decoration-none">
                    <!-- 💡 이미지 경로: ./assets/images/mainPage/동동이.jpg -->
                    <div class="img-container">
                        <img src="./assets/images/mainPage/동동이.jpg" class="card-img-top" alt="동동봇"
                            onerror="this.src='https://via.placeholder.com/300?text=(이미지 준비 중)'">
                    </div>
                    <div class="card-body d-flex flex-column justify-content-end">
                        <div class="card-text-custom text-center fw-bold">동동봇</div>
                    </div>
                </a>
            </div>

            <!-- 다섯 번째 카드: 업무자동화 -->
            <div class="col-12 col-md-6 col-lg-3">
                <a href="./pages/schoolautomation/travel_expense_report.html" class="card h-100 text-decoration-none">
                    <!-- 💡 이미지 경로: ./assets/images/mainPage/업무자동화.jpg -->
                    <div class="img-container">
                        <img src="./assets/images/mainPage/업무자동화.jpg" class="card-img-top" alt="업무자동화"
                            onerror="this.src='https://via.placeholder.com/300?text=(이미지 준비 중)'">
                    </div>
                    <div class="card-body d-flex flex-column justify-content-end">
                        <div class="card-text-custom text-center fw-bold">업무자동화</div>
                    </div>
                </a>
            </div>

        </div>
    </div>

    <!-- Bootstrap 기능 작동을 위한 JS 라이브러리 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 추가 기능 구현을 위해 연결해 둔 커스텀 JS 파일 -->
    <script src="script.js"></script>
</body>

</html>
