<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>디졸브 효과 탐구</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../../css/navbar.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css');

        body {
            font-family: 'Pretendard Variable', sans-serif;
            background-color: #ffffff;
            padding: 0;
        }

        .upload-area {
            border: 2px dashed #0d6efd;
            border-radius: 12px;
            transition: background-color 0.2s ease-in-out;
            cursor: pointer;
            padding: 2rem;
        }

        .upload-area:hover {
            background-color: #f8f9fa;
        }

        .canvas-container {
            width: 100%;
            min-height: 320px;
            background-color: #ffffff;
            border-radius: 0.5rem;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: repeating-linear-gradient(45deg, #f1f5f9 25%, transparent 25%, transparent 75%, #f1f5f9 75%, #f1f5f9), repeating-linear-gradient(45deg, #f1f5f9 25%, #ffffff 25%, #ffffff 75%, #f1f5f9 75%, #f1f5f9);
            background-position: 0 0, 10px 10px;
            background-size: 20px 20px;
        }

        #result-canvas {
            max-width: 100%;
            max-height: 60vh;
            height: auto;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border-radius: 4px;
        }

        .source-img {
            width: 100%;
            height: auto;
            border-radius: 0.5rem;
            box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1);
        }

        .toggle-track {
            width: 40px; height: 24px;
            background: #cbd5e1;
            border-radius: 999px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }
        .toggle-track.on { background: #3b82f6; }
        .toggle-dot {
            width: 18px; height: 18px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 3px; left: 3px;
            transition: transform 0.2s;
        }
        .toggle-track.on .toggle-dot { transform: translateX(16px); }
    </style>
</head>

<body>
    <script src="../../../js/navbar.js"></script>

    <main class="container py-4">
        <h2 class="fw-bold mb-4 text-center">✨ 디졸브 효과</h2>

        <!-- 파일 업로드 (아코디언) -->
        <div class="accordion mb-4 shadow-sm" id="uploadAccordion">
            <div class="accordion-item border-0">
                <h2 class="accordion-header" id="headingUpload">
                    <button class="accordion-button fw-bold text-primary bg-light" type="button"
                        data-bs-toggle="collapse" data-bs-target="#collapseUpload" aria-expanded="true"
                        aria-controls="collapseUpload">
                        📂 이미지 2개 업로드 (첫 번째, 두 번째)
                    </button>
                </h2>
                <div id="collapseUpload" class="accordion-collapse collapse show" aria-labelledby="headingUpload"
                    data-bs-parent="#uploadAccordion">
                    <div class="accordion-body p-4 bg-white">
                        <div class="upload-area">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label text-primary fw-semibold">첫 번째 이미지</label>
                                    <input class="form-control border-primary" type="file" id="upload1" accept="image/png, image/jpeg">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-success fw-semibold">두 번째 이미지</label>
                                    <input class="form-control border-success" type="file" id="upload2" accept="image/png, image/jpeg">
                                </div>
                            </div>
                            <p class="mb-0 mt-3 text-muted fw-semibold text-center">PNG 또는 JPEG 이미지 파일 2개를 각각 업로드해주세요.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 안내 문구 -->
        <div id="info-msg" class="alert alert-info border-0 shadow-sm">
            👆 상단의 '이미지 업로드'를 열어 이미지 파일 2개를 모두 업로드해주세요.
        </div>

        <!-- 메인 워크스페이스 (초기 숨김) -->
        <div id="workspace" class="d-none">
            <div class="row g-4">
                <!-- 설정 및 제어 -->
                <div class="col-lg-3">
                    <div class="card shadow-sm h-100">
                        <div class="card-body d-flex flex-column gap-3">
                            <div>
                                <h5 class="fw-bold mb-1">⚙️ 설정 및 제어</h5>
                                <p class="text-muted small mb-0">해상도 설정</p>
                            </div>
                            <div class="rounded p-3 bg-light border small text-secondary">
                                <p class="fw-semibold text-dark mb-1">📐 출력 해상도</p>
                                <p class="mb-0">업로드한 이미지 크기를 기준으로 자동 설정됩니다.</p>
                            </div>
                            <div class="border-top pt-3">
                                <label class="d-flex align-items-center gap-2 mb-2" style="cursor:pointer;">
                                    <input type="checkbox" id="auto-mode" class="d-none">
                                    <div class="toggle-track" id="toggle-bg">
                                        <div class="toggle-dot" id="toggle-dot"></div>
                                    </div>
                                    <span class="fw-medium small">자동 실행 모드</span>
                                </label>
                                <p id="mode-desc" class="text-muted small mb-3">수동 제어 중...</p>

                                <!-- 자동 제어 UI -->
                                <div id="auto-ui" class="d-none">
                                    <button id="btn-play" class="btn btn-primary w-100 fw-bold">
                                        ⏯️ 재생 / 일시정지
                                    </button>
                                    <div id="play-status" class="mt-2 text-center small p-2 bg-light rounded">
                                        ⏸️ 일시 정지
                                    </div>
                                </div>

                                <!-- 수동 제어 UI -->
                                <div id="manual-ui">
                                    <label class="form-label fw-medium small">가중치 (Alpha): <span id="alpha-val">0.00</span></label>
                                    <input type="range" id="alpha-slider" min="0" max="1" step="0.01" value="0" class="form-range">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 결과 캔버스 -->
                <div class="col-lg-6">
                    <div class="card shadow-sm h-100">
                        <div class="card-body">
                            <h5 class="fw-bold mb-3">✨ 결과</h5>
                            <div class="canvas-container p-2">
                                <canvas id="result-canvas"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 소스 이미지 -->
                <div class="col-lg-3">
                    <div class="card shadow-sm h-100">
                        <div class="card-body d-flex flex-column gap-3">
                            <h5 class="fw-bold mb-1">원본 소스</h5>
                            <div>
                                <p class="text-muted small mb-1">이미지 1</p>
                                <img id="src-img1" class="source-img d-none">
                                <div id="ph1" class="w-100 bg-light rounded border border-dashed d-flex align-items-center justify-content-center text-muted small" style="height:96px;">대기 중</div>
                            </div>
                            <div>
                                <p class="text-muted small mb-1">이미지 2</p>
                                <img id="src-img2" class="source-img d-none">
                                <div id="ph2" class="w-100 bg-light rounded border border-dashed d-flex align-items-center justify-content-center text-muted small" style="height:96px;">대기 중</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // DOM 요소 가져오기
        const upload1 = document.getElementById('upload1');
        const upload2 = document.getElementById('upload2');
        const workspace = document.getElementById('workspace');
        const infoMsg = document.getElementById('info-msg');

        const srcImg1 = document.getElementById('src-img1');
        const srcImg2 = document.getElementById('src-img2');
        const ph1 = document.getElementById('ph1');
        const ph2 = document.getElementById('ph2');

        const canvas = document.getElementById('result-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true }); // 성능 최적화 옵션

        const autoModeToggle = document.getElementById('auto-mode');
        const toggleBg = document.getElementById('toggle-bg');
        const toggleDot = document.getElementById('toggle-dot');
        const modeDesc = document.getElementById('mode-desc');
        const autoUi = document.getElementById('auto-ui');
        const manualUi = document.getElementById('manual-ui');
        const alphaSlider = document.getElementById('alpha-slider');
        const alphaValText = document.getElementById('alpha-val');

        const btnPlay = document.getElementById('btn-play');
        const playStatus = document.getElementById('play-status');

        // 앱 상태 변수
        let img1Loaded = false;
        let img2Loaded = false;
        let isAutoMode = false;
        let isPlaying = false;
        let currentAlpha = 0.0;
        let animationId = null;
        let outputW = 0;
        let outputH = 0;

        // 이미지 로딩 처리 (FileReader 사용)
        function handleImageUpload(input, imgElement, placeholder, callback) {
            input.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        imgElement.src = event.target.result;
                        imgElement.onload = () => {
                            imgElement.classList.remove('d-none');
                            placeholder.classList.add('d-none');
                            callback();
                        };
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        handleImageUpload(upload1, srcImg1, ph1, checkBothLoaded);
        handleImageUpload(upload2, srcImg2, ph2, checkBothLoaded);

        // 두 이미지가 모두 업로드 되었을 때 워크스페이스 열기
        function getAutoOutputSize(width, height) {
            const minW = 800;
            const minH = 600;
            const scale = Math.max(minW / width, minH / height, 1);

            return {
                width: Math.max(Math.round(width * scale), width),
                height: Math.max(Math.round(height * scale), height)
            };
        }

        function checkBothLoaded() {
            if (srcImg1.src && srcImg2.src && srcImg1.src !== window.location.href && srcImg2.src !== window.location.href) {
                if (!img1Loaded || !img2Loaded) {
                    const { width, height } = getAutoOutputSize(srcImg1.naturalWidth, srcImg1.naturalHeight);
                    outputW = width;
                    outputH = height;
                }

                img1Loaded = true;
                img2Loaded = true;

                infoMsg.classList.add('d-none');
                workspace.classList.remove('d-none');

                // 업로드 완료 후 아코디언 자동 접기
                const collapseEl = document.getElementById('collapseUpload');
                const bsCollapse = bootstrap.Collapse.getInstance(collapseEl) || new bootstrap.Collapse(collapseEl, { toggle: false });
                bsCollapse.hide();

                updateCanvasSize();
                renderCanvas();
            }
        }

        // 캔버스 크기 업데이트
        function updateCanvasSize() {
            if (!outputW || !outputH) return;
            canvas.width = outputW;
            canvas.height = outputH;
        }

        // [핵심] HTML5 Canvas를 이용한 디졸브 렌더링
        function renderCanvas() {
            if (!img1Loaded || !img2Loaded) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 첫 번째 이미지 그리기 (불투명도 1.0 고정)
            ctx.globalAlpha = 1.0;
            ctx.drawImage(srcImg1, 0, 0, canvas.width, canvas.height);

            // 두 번째 이미지 그리기 (불투명도를 Alpha 값으로 덮어씌움)
            // 이것이 numpy의 (arr1 * (1 - alpha)) + (arr2 * alpha) 와 수학적으로 완벽히 동일합니다.
            ctx.globalAlpha = currentAlpha;
            ctx.drawImage(srcImg2, 0, 0, canvas.width, canvas.height);
        }

        // 수동 슬라이더 이벤트
        alphaSlider.addEventListener('input', (e) => {
            currentAlpha = parseFloat(e.target.value);
            alphaValText.innerText = currentAlpha.toFixed(2);
            renderCanvas();
        });

        // 토글 버튼 (자동/수동) 스위치 로직
        toggleBg.addEventListener('click', () => {
            autoModeToggle.checked = !autoModeToggle.checked;
            isAutoMode = autoModeToggle.checked;
            if (isAutoMode) {
                toggleBg.classList.add('on');
                modeDesc.innerText = "자동 제어 중...";
                manualUi.classList.add('d-none');
                autoUi.classList.remove('d-none');
            } else {
                toggleBg.classList.remove('on');
                modeDesc.innerText = "수동 제어 중...";
                manualUi.classList.remove('d-none');
                autoUi.classList.add('d-none');

                // 수동 모드로 돌아갈 때 애니메이션 정지
                isPlaying = false;
                updatePlayStatusUI();
                cancelAnimationFrame(animationId);
            }
        });

        // 애니메이션 루프 (requestAnimationFrame 사용으로 60fps 보장)
        function animate() {
            if (!isPlaying) return;

            // 프레임당 알파값 증가량 (0.0075 -> 1.5배 빠른 재생, 약 2.2초 완성)
            currentAlpha += 0.0075;

            if (currentAlpha >= 1.0) {
                currentAlpha = 1.0;
                isPlaying = false;
                updatePlayStatusUI();
            }

            // 슬라이더 값 동기화
            alphaSlider.value = currentAlpha;
            alphaValText.innerText = currentAlpha.toFixed(2);
            updatePlayStatusUI();

            renderCanvas();

            if (isPlaying) {
                animationId = requestAnimationFrame(animate);
            }
        }

        function updatePlayStatusUI() {
            if (isPlaying) {
                playStatus.innerHTML = `<span class="text-success fw-bold">▶️ 재생 중: ${currentAlpha.toFixed(2)}</span>`;
                playStatus.className = 'mt-2 text-center small p-2 bg-success bg-opacity-10 rounded';
            } else {
                playStatus.innerHTML = `⏸️ 일시 정지`;
                playStatus.className = 'mt-2 text-center small p-2 bg-light rounded';
            }
        }

        // 재생/일시정지 버튼
        btnPlay.addEventListener('click', () => {
            isPlaying = !isPlaying;

            if (isPlaying && currentAlpha >= 1.0) {
                currentAlpha = 0.0; // 끝났으면 처음부터 다시
            }

            updatePlayStatusUI();

            if (isPlaying) {
                animate();
            } else {
                cancelAnimationFrame(animationId);
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
