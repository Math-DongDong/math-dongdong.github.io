<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이미지 해상도</title>
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- 네비게이션바 CSS -->
  <link rel="stylesheet" href="../../../css/navbar.css">
  <style>
    body {
      background-color: #ffffff;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
    }

    .preview-canvas {
      max-width: 100%;
      height: auto;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      /* 픽셀아트 느낌을 살리기 위한 렌더링 옵션 */
      image-rendering: -moz-crisp-edges;
      image-rendering: -webkit-crisp-edges;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .upload-area {
      border: 2px dashed #0d6efd;
      border-radius: 12px;
      transition: background-color 0.2s ease-in-out;
      cursor: pointer;
    }

    .upload-area:hover {
      background-color: #f8f9fa;
    }
  </style>
</head>

<body>

  <!-- 상단 네비게이션바 -->
  <script src="../../../js/navbar.js"></script>

  <div class="container py-4">
    <h2 class="fw-bold mb-4 text-center">🖼️ 이미지 해상도</h2>

    <!-- 업로드 섹션 (아코디언 적용) -->
    <div class="accordion mb-4 shadow-sm" id="uploadAccordion">
      <div class="accordion-item border-0">
        <h2 class="accordion-header" id="headingUpload">
          <button class="accordion-button fw-bold text-primary bg-light" type="button" data-bs-toggle="collapse"
            data-bs-target="#collapseUpload" aria-expanded="true" aria-controls="collapseUpload">
            📂 이미지 업로드
          </button>
        </h2>
        <div id="collapseUpload" class="accordion-collapse collapse show" aria-labelledby="headingUpload"
          data-bs-parent="#uploadAccordion">
          <div class="accordion-body p-4 bg-white">
            <div class="upload-area p-5 text-center position-relative" id="drop-zone">
              <input type="file" id="image-upload" accept="image/png, image/jpeg, image/jpg"
                class="position-absolute top-0 start-0 w-100 h-100 opacity-0" style="cursor: pointer;">
              <span class="fs-1">🖼️</span>
              <p class="mb-0 mt-2 text-muted fw-semibold">이미지 파일을 드래그 앤 드롭하거나 클릭하여 업로드하세요. (png, jpg, jpeg)</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 로딩 및 정보 알림 -->
    <div id="info-alert" class="alert alert-info border-0 shadow-sm" role="alert">
      👆 상단의 '이미지 업로드'를 열어 이미지 파일( png, jpg, jpeg )을 먼저 업로드해주세요.
    </div>

    <!-- 메인 이미지 에디터 섹션 (업로드 전에는 숨김) -->
    <div id="editor-section" class="d-none">
      <div class="row g-4 align-items-stretch">

        <!-- [1열] 설정 & 조절 단 -->
        <div class="col-lg-3 col-md-12">
          <div class="card border-0 shadow-sm h-100">
            <div class="card-body p-4 d-flex flex-column">
              <div>
                <h5 class="fw-bold mb-3 text-primary border-bottom pb-2">해상도 설정</h5>

                <div class="mb-3">
                  <label for="input-width" class="form-label fw-semibold text-secondary">가로(Width) px</label>
                  <div class="input-group">
                    <input type="number" id="input-width" class="form-control" min="1" step="1">
                    <span class="input-group-text">px</span>
                  </div>
                </div>

                <div class="mb-4">
                  <label for="input-height" class="form-label fw-semibold text-secondary">세로(Height) px</label>
                  <div class="input-group">
                    <input type="number" id="input-height" class="form-control" min="1" step="1">
                    <span class="input-group-text">px</span>
                  </div>
                </div>

                <div class="form-check form-switch mb-2">
                  <input class="form-check-input" type="checkbox" role="switch" id="ratio-lock" checked>
                  <label class="form-check-label text-muted small" for="ratio-lock">가로/세로 비율 유지</label>
                </div>
              </div>

              <!-- 종횡비 유지 스위치 바로 아래 고정 마진으로 다운로드 버튼 배치 -->
              <div class="mt-4">
                <button id="download-btn"
                  class="btn btn-primary w-100 fw-bold py-3 shadow-sm d-flex align-items-center justify-content-center gap-2">
                  <span>💾</span> 변환 이미지 다운로드
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- [2열] 변환 이미지 프리뷰 (col-lg 부여로 우측 열과 동일 너비 보장) -->
        <div class="col-lg col-md-6 col-12">
          <div class="card border-0 shadow-sm h-100">
            <div class="card-body p-4 text-center d-flex flex-column">
              <h5 class="fw-bold mb-3 text-secondary text-start">변환 이미지</h5>
              <div class="d-flex align-items-center justify-content-center flex-grow-1" style="min-height: 300px;">
                <canvas id="canvas-preview" class="preview-canvas"></canvas>
              </div>
            </div>
          </div>
        </div>

        <!-- [3열] 원본/기준 이미지 (col-lg 부여로 동일 너비 보장) -->
        <div class="col-lg col-md-6 col-12">
          <div class="card border-0 shadow-sm h-100">
            <div class="card-body p-4 text-center d-flex flex-column">
              <h5 class="fw-bold mb-3 text-secondary text-start">
                원본 이미지 <span id="original-res" class="text-muted fw-normal ms-2" style="font-size: 0.9rem;"></span>
              </h5>
              <div class="d-flex align-items-center justify-content-center flex-grow-1" style="min-height: 300px;">
                <img id="img-original" class="preview-canvas" alt="Original Image">
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const fileInput = document.getElementById('image-upload');
      const dropZone = document.getElementById('drop-zone');
      const infoAlert = document.getElementById('info-alert');
      const editorSection = document.getElementById('editor-section');
      const inputWidth = document.getElementById('input-width');
      const inputHeight = document.getElementById('input-height');
      const ratioLock = document.getElementById('ratio-lock');
      const downloadBtn = document.getElementById('download-btn');
      const imgOriginal = document.getElementById('img-original');
      const originalResLabel = document.getElementById('original-res');
      const canvasPreview = document.getElementById('canvas-preview');
      const ctxPreview = canvasPreview.getContext('2d');

      // 변환 및 다운로드를 위한 오프스크린 캔버스들
      const canvasBase = document.createElement('canvas'); // 원본 이미지 데이터 저장용
      const ctxBase = canvasBase.getContext('2d');
      const canvasPixelated = document.createElement('canvas'); // 해상도가 변경된 상태
      const ctxPixelated = canvasPixelated.getContext('2d');

      let originalWidth = 0;
      let originalHeight = 0;
      let filename = 'image.png';
      let imgType = 'image/png';
      let currentImage = null;
      let aspectRatio = 1;

      // 파일 업로드 이벤트 핸들러
      fileInput.addEventListener('change', handleFileSelect);
      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('bg-light');
      });
      dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('bg-light');
      });
      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('bg-light');
        if (e.dataTransfer.files.length > 0) {
          fileInput.files = e.dataTransfer.files;
          handleFileSelect();
        }
      });

      function handleFileSelect() {
        const file = fileInput.files[0];
        if (!file) return;

        filename = file.name;
        imgType = file.type || 'image/png';

        const reader = new FileReader();
        reader.onload = function (e) {
          const img = new Image();
          img.onload = function () {
            currentImage = img;
            processLoadedImage(img);
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }

      function processLoadedImage(img) {
        // 원본 해상도 그대로 사용
        originalWidth = img.naturalWidth || img.width;
        originalHeight = img.naturalHeight || img.height;
        aspectRatio = originalWidth / originalHeight;

        // 기준 캔버스 크기 지정 및 원본 렌더링
        canvasBase.width = originalWidth;
        canvasBase.height = originalHeight;
        ctxBase.drawImage(img, 0, 0, originalWidth, originalHeight);

        // 원본 뷰어 연결
        imgOriginal.src = canvasBase.toDataURL(imgType);

        // 제목 옆에 원본 해상도 정보 삽입
        originalResLabel.innerText = `(${originalWidth} x ${originalHeight})`;

        // 입력 폼 제어 및 원본 값 바인딩
        inputWidth.max = originalWidth;
        inputHeight.max = originalHeight;
        inputWidth.value = originalWidth;
        inputHeight.value = originalHeight;

        // 섹션 가시성 제어
        infoAlert.classList.add('d-none');
        editorSection.classList.remove('d-none');

        // 이미지가 로드되면 편의를 위해 아코디언 자동 접기
        const collapseElement = document.getElementById('collapseUpload');
        const bsCollapse = bootstrap.Collapse.getInstance(collapseElement) || new bootstrap.Collapse(collapseElement, { toggle: false });
        bsCollapse.hide();

        updatePixelation();
      }

      // 해상도 입력 변경 리스너
      inputWidth.addEventListener('input', () => {
        let val = parseInt(inputWidth.value);
        if (isNaN(val) || val < 1) val = 1;
        inputWidth.value = val;

        if (ratioLock.checked) {
          const companionVal = Math.max(1, Math.round(val / aspectRatio));
          inputHeight.value = companionVal;
        }
        updatePixelation();
      });

      inputHeight.addEventListener('input', () => {
        let val = parseInt(inputHeight.value);
        if (isNaN(val) || val < 1) val = 1;
        inputHeight.value = val;

        if (ratioLock.checked) {
          const companionVal = Math.max(1, Math.round(val * aspectRatio));
          inputWidth.value = companionVal;
        }
        updatePixelation();
      });

      function updatePixelation() {
        if (!currentImage) return;

        const w = parseInt(inputWidth.value) || 1;
        const h = parseInt(inputHeight.value) || 1;

        // 1. 축소 캔버스 생성 (입력된 해상도로 렌더링)
        canvasPixelated.width = w;
        canvasPixelated.height = h;
        ctxPixelated.drawImage(canvasBase, 0, 0, w, h);

        // 2. 프리뷰 캔버스에 렌더링 (imageSmoothingEnabled를 끄고 확대 복사하여 도트 느낌 유지)
        canvasPreview.width = originalWidth;
        canvasPreview.height = originalHeight;

        ctxPreview.imageSmoothingEnabled = false;
        ctxPreview.mozImageSmoothingEnabled = false;
        ctxPreview.webkitImageSmoothingEnabled = false;
        ctxPreview.msImageSmoothingEnabled = false;

        ctxPreview.drawImage(canvasPixelated, 0, 0, w, h, 0, 0, originalWidth, originalHeight);
      }

      // 다운로드 이벤트
      downloadBtn.addEventListener('click', () => {
        if (!currentImage) return;

        const link = document.createElement('a');
        link.download = `pixelated_${filename}`;
        // 해상도가 저하된 캔버스(실제 축소된 크기)에서 데이터를 직접 추출
        link.href = canvasPixelated.toDataURL(imgType);
        link.click();
      });
    });
  </script>
</body>

</html>
