<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지 합성</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../../css/navbar.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css');

        body {
            font-family: 'Pretendard Variable', sans-serif;
            background-color: #ffffff;
            padding: 0;
        }

        .upload-area {
            border: 2px dashed #0d6efd;
            border-radius: 12px;
            transition: background-color 0.2s ease-in-out;
            cursor: pointer;
            padding: 2rem;
        }

        .upload-area:hover {
            background-color: #f8f9fa;
        }

        .pixel-canvas {
            max-width: 100%;
            image-rendering: pixelated;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            max-height: 400px;
            object-fit: contain;
        }

        .table-wrapper {
            max-height: 250px;
            overflow: auto;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }

        .table-matrix {
            font-size: 0.75rem;
            text-align: center;
            margin-bottom: 0;
            white-space: nowrap;
        }

        .table-matrix td {
            padding: 0.2rem 0.4rem;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>

<body>
    <script src="../../../js/navbar.js"></script>

    <main class="container py-4">
        <div class="d-flex justify-content-between align-items-end mb-4">
            <h2 class="fw-bold mb-0">➕ 이미지의 합성</h2>
            <a href="./Dissolve.html" class="btn btn-outline-success fw-bold align-self-end">
                <i class="bi bi-stars"></i> 디졸브 효과
            </a>
        </div>

        <!-- 업로드 섹션 (아코디언 적용) -->
        <div class="accordion mb-4 shadow-sm" id="uploadAccordion">
            <div class="accordion-item border-0">
                <h2 class="accordion-header" id="headingUpload">
                    <button class="accordion-button fw-bold text-primary bg-light" type="button"
                        data-bs-toggle="collapse" data-bs-target="#collapseUpload" aria-expanded="true"
                        aria-controls="collapseUpload">
                        📂 픽셀 데이터 2개 업로드 (행렬 A, B)
                    </button>
                </h2>
                <div id="collapseUpload" class="accordion-collapse collapse show" aria-labelledby="headingUpload"
                    data-bs-parent="#uploadAccordion">
                    <div class="accordion-body p-4 bg-white">
                        <div class="upload-area">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label text-primary fw-semibold">행렬 A (Excel)</label>
                                    <input class="form-control border-primary" type="file" id="upload-a" accept=".xlsx">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-success fw-semibold">행렬 B (Excel)</label>
                                    <input class="form-control border-success" type="file" id="upload-b" accept=".xlsx">
                                </div>
                            </div>
                            <p class="mb-0 mt-3 text-muted fw-semibold text-center">엑셀 파일(.xlsx) 2개를 각각 업로드해주세요.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="info-alert" class="alert alert-info border-0 shadow-sm">
            👆 상단의 '픽셀 데이터 2개 업로드'를 열어 엑셀 파일(.xlsx) 2개를 모두 업로드해주세요.
        </div>

        <div id="content-area" class="d-none">
            <div class="row g-4 mb-4">
                <div class="col-md-6 text-center">
                    <h5 class="fw-bold">🅰️ 행렬 A</h5>
                    <div class="table-wrapper" id="matrix-a-preview"></div>
                </div>
                <div class="col-md-6 text-center">
                    <h5 class="fw-bold">🅱️ 행렬 B</h5>
                    <div class="table-wrapper" id="matrix-b-preview"></div>
                </div>
            </div>

            <div class="row g-3 align-items-end mb-4 bg-light p-3 rounded border">
                <div class="col-md-3">
                    <label class="form-label fw-bold">A의 실수배 (k₁)</label>
                    <input type="number" id="k1-val" class="form-control" value="1.0" step="0.1">
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-bold w-100 text-center">연산</label>
                    <select id="op-type" class="form-select text-center fw-bold">
                        <option value="add">➕</option>
                        <option value="sub">➖</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">B의 실수배 (k₂)</label>
                    <input type="number" id="k2-val" class="form-control" value="1.0" step="0.1">
                </div>
                <div class="col-md-4">
                    <button id="btn-calc" class="btn btn-primary w-100 fw-bold"><i class="bi bi-lightning-fill"></i> 계산
                        실행</button>
                </div>
            </div>

            <div id="result-area" class="row g-4 d-none border-top pt-4">
                <div class="col-md-6 text-center d-flex flex-column">
                    <h5 class="fw-bold mb-3">합성된 결과 이미지</h5>
                    <div class="flex-grow-1 d-flex align-items-center justify-content-center">
                        <canvas id="canvas-res" class="pixel-canvas"></canvas>
                    </div>
                </div>
                <div class="col-md-6 text-center d-flex flex-column">
                    <h5 class="fw-bold mb-3">결과 행렬</h5>
                    <div class="table-wrapper flex-grow-1" id="matrix-res"></div>
                </div>
            </div>


        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- 공통 유틸리티 스크립트 불러오기 -->
    <script src="../../../js/utils_matrix.js"></script>

    <script>
        let matrixA = null, matrixB = null;

        async function checkUploads() {
            const fileA = document.getElementById('upload-a').files[0];
            const fileB = document.getElementById('upload-b').files[0];
            if (fileA && fileB) {
                try {
                    matrixA = await readExcel(fileA);
                    matrixB = await readExcel(fileB);
                    if (matrixA.length !== matrixB.length || matrixA[0].length !== matrixB[0].length) {
                        alert("두 행렬의 크기가 다릅니다!"); return;
                    }
                    renderMatrixToTable(matrixA, 'matrix-a-preview');
                    renderMatrixToTable(matrixB, 'matrix-b-preview');
                    document.getElementById('info-alert').classList.add('d-none');
                    document.getElementById('content-area').classList.remove('d-none');

                    // 업로드 완료 후 아코디언 자동 접기
                    const collapseEl = document.getElementById('collapseUpload');
                    const bsCollapse = bootstrap.Collapse.getInstance(collapseEl) || new bootstrap.Collapse(collapseEl, { toggle: false });
                    bsCollapse.hide();
                } catch (err) { alert("파일을 읽는 중 오류가 발생했습니다."); }
            }
        }

        document.getElementById('upload-a').addEventListener('change', checkUploads);
        document.getElementById('upload-b').addEventListener('change', checkUploads);

        document.getElementById('btn-calc').addEventListener('click', () => {
            if (!matrixA || !matrixB) return;
            const k1 = parseFloat(document.getElementById('k1-val').value) || 0;
            const k2 = parseFloat(document.getElementById('k2-val').value) || 0;
            const opType = document.getElementById('op-type').value;

            const rows = matrixA.length, cols = matrixA[0].length;
            let resultMatrix = [];
            for (let r = 0; r < rows; r++) {
                resultMatrix.push([]);
                for (let c = 0; c < cols; c++) {
                    const valA = matrixA[r][c] * k1, valB = matrixB[r][c] * k2;
                    resultMatrix[r].push(Math.max(0, Math.min(255, Math.round(opType === 'add' ? valA + valB : valA - valB))));
                }
            }
            renderMatrixToCanvas(resultMatrix, 'canvas-res');
            renderMatrixToTable(resultMatrix, 'matrix-res');
            document.getElementById('result-area').classList.remove('d-none');
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
