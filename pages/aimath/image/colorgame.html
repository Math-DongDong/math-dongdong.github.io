<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>컬러 감각 테스트</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../../css/navbar.css">

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css');

        body {
            font-family: 'Pretendard Variable', sans-serif;
            background-color: #ffffff;
            padding-bottom: 50px;
        }

        /* 색상 상자 공통 스타일 */
        .color-box {
            width: 100%;
            aspect-ratio: 1;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1), 0 4px 6px rgba(0,0,0,0.05);
            border: 4px solid #fff;
            transition: all 0.3s ease;
        }

        /* 붙어있는 상자 스타일 조정 */
        #target-color {
            border-radius: 20px 0 0 20px;
            border-right: none;
        }
        #user-color {
            border-radius: 0 20px 20px 0;
            border-left: none;
        }

        /* 내 색상 가리기 (제출 전 블라인드 상태) */
        .hidden-color {
            background-color: #e9ecef !important;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            color: #ced4da;
        }

        /* 슬라이더 색상 커스텀 */
        #slider-r { accent-color: #dc3545; }
        #slider-g { accent-color: #198754; }
        #slider-b { accent-color: #0d6efd; }

        .rgb-value-badge {
            display: inline-block;
            width: 65px;
            text-align: center;
            font-weight: bold;
        }

        /* 점수 뱃지 */
        .score-badge {
            font-size: 1.1rem;
            padding: 0.6rem 1.2rem;
        }
    </style>
</head>

<body>
    <script src="../../../js/navbar.js"></script>

    <main class="container py-4 mt-3">
        <h2 class="fw-bold mb-4 text-center">🎨 컬러 감각 테스트</h2>

        <!-- ==================== 게임 영역 ==================== -->
        <div id="game-section">
            
            <!-- 게임 정보 바 (라운드 및 평균 점수) -->
            <div class="d-flex justify-content-between align-items-center bg-light rounded-4 p-3 mb-4 mx-auto" style="max-width: 800px;">
                <span class="badge bg-primary score-badge">
                    라운드 <span id="current-round">1</span> / 7
                </span>
                <span class="badge bg-warning text-dark score-badge">
                    평균 점수: <span id="avg-score">-</span>점
                </span>
            </div>

            <p class="text-center text-muted mb-4">
                빛의 삼원색(R, G, B)을 <b>7단계</b>로 조절하여 똑같이 만들어보세요.
            </p>

            <!-- 1행: 색상 비교 영역 (맞닿게 배치) -->
            <div class="d-flex justify-content-center text-center align-items-end mx-auto mb-4" style="max-width: 450px;">
                <!-- 목표 색상 -->
                <div class="w-50">
                    <h5 class="fw-bold mb-3 text-secondary"><i class="bi bi-bullseye"></i> 목표 색상</h5>
                    <div id="target-color" class="color-box"></div>
                </div>

                <!-- 내가 만든 색상 -->
                <div class="w-50">
                    <h5 class="fw-bold mb-3 text-primary"><i class="bi bi-palette"></i> 내가 만든 색상</h5>
                    <div id="user-color" class="color-box hidden-color">
                        <i class="bi bi-question-lg" id="question-mark"></i>
                    </div>
                </div>
            </div>

            <!-- 결과 피드백 영역 (제출 시 표시, 힌트는 토스트로 분리) -->
            <div id="result-area" class="text-center mb-4 d-none">
                <h1 class="display-3 fw-bold text-primary mb-2" id="score-display">0점</h1>
                <p class="fs-5 text-secondary fw-semibold mb-2" id="feedback-display"></p>
            </div>

            <!-- 2행: 컨트롤 슬라이더 영역 -->
            <div class="row justify-content-center">
                <div class="col-lg-8 col-md-10">
                    <div class="card border-0 shadow-sm rounded-4 p-4 mb-5">
                        
                        <!-- R 슬라이더 (0~6) -->
                        <div class="mb-4">
                            <label class="form-label fw-bold text-danger d-flex justify-content-between w-100">
                                <span>Red (빨강) <span class="ms-3 text-muted small fw-medium">RGB값: <span id="actual-r">127</span></span></span>
                                <span class="badge bg-danger rounded-pill rgb-value-badge" id="val-r">3단계</span>
                            </label>
                            <input type="range" class="form-range" id="slider-r" min="0" max="6" step="1" value="3">
                        </div>
                        
                        <!-- G 슬라이더 (0~6) -->
                        <div class="mb-4">
                            <label class="form-label fw-bold text-success d-flex justify-content-between w-100">
                                <span>Green (초록) <span class="ms-3 text-muted small fw-medium">RGB값: <span id="actual-g">127</span></span></span>
                                <span class="badge bg-success rounded-pill rgb-value-badge" id="val-g">3단계</span>
                            </label>
                            <input type="range" class="form-range" id="slider-g" min="0" max="6" step="1" value="3">
                        </div>

                        <!-- B 슬라이더 (0~6) -->
                        <div class="mb-4">
                            <label class="form-label fw-bold text-primary d-flex justify-content-between w-100">
                                <span>Blue (파랑) <span class="ms-3 text-muted small fw-medium">RGB값: <span id="actual-b">127</span></span></span>
                                <span class="badge bg-primary rounded-pill rgb-value-badge" id="val-b">3단계</span>
                            </label>
                            <input type="range" class="form-range" id="slider-b" min="0" max="6" step="1" value="3">
                        </div>

                        <button id="btn-action" class="btn btn-primary w-100 fw-bold py-3 fs-5 shadow-sm">
                            <i class="bi bi-check-circle"></i> 제출하고 색상 확인하기
                        </button>
                    </div>
                </div>
            </div>

            <!-- 시도 기록 영역 (모든 라운드 기록 누적) -->
            <div class="row justify-content-center">
                <div class="col-lg-8 col-md-10">
                    <h5 class="fw-bold mb-3 text-secondary"><i class="bi bi-clock-history"></i> 전체 시도 기록</h5>
                    <ul class="list-group list-group-flush border-top border-bottom bg-light rounded-3" id="history-list">
                        <!-- 기록이 추가되는 곳 -->
                        <li class="list-group-item text-center text-muted py-4" id="history-placeholder">
                            아직 제출한 기록이 없습니다. 색상을 섞어 제출해보세요!
                        </li>
                    </ul>
                </div>
            </div>

        </div>

        <!-- ==================== 최종 결과 영역 ==================== -->
        <div id="final-section" class="d-none">
            <div class="card border-0 shadow-sm rounded-4 text-center py-5">
                <div class="card-body">
                    <h2 class="fw-bold mb-2">🎉 게임 완료!</h2>
                    <div id="final-score" class="display-1 fw-bold text-primary my-3"></div>
                    <p class="text-muted mb-3">7라운드 평균 점수</p>

                    <p id="final-comment" class="fs-5 fw-semibold mb-5"></p>
                    
                    <button class="btn btn-primary btn-lg fw-bold px-5" id="btn-restart">
                        <i class="bi bi-arrow-clockwise"></i> 다시 도전하기
                    </button>
                </div>
            </div>
        </div>

    </main>

    <!-- 토스트 컨테이너 (우측 하단 배치) -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1055">
        <div id="hintToast" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="3000">
            <div class="d-flex">
                <div class="toast-body fs-6" id="toastMessage">
                    <!-- 힌트 메시지 출력 부분 -->
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // 7단계(0~6)에 매칭되는 실제 RGB 값 (255를 6등분)
        const rgbSteps = [0, 42, 85, 127, 170, 212, 255];
        const TOTAL_ROUNDS = 7;
        
        let gameState = {
            round: 1,
            scores: []
        };
        
        let targetSteps = { r: 0, g: 0, b: 0 };
        let isSubmitted = false;
        let isCorrect = false;
        let failCount = 0;
        let attemptCount = 0;

        const sliderR = document.getElementById('slider-r');
        const sliderG = document.getElementById('slider-g');
        const sliderB = document.getElementById('slider-b');
        
        const valR = document.getElementById('val-r');
        const valG = document.getElementById('val-g');
        const valB = document.getElementById('val-b');

        const actualR = document.getElementById('actual-r');
        const actualG = document.getElementById('actual-g');
        const actualB = document.getElementById('actual-b');

        const boxTarget = document.getElementById('target-color');
        const boxUser = document.getElementById('user-color');
        const iconQuestion = document.getElementById('question-mark');
        const btnAction = document.getElementById('btn-action');
        const resultArea = document.getElementById('result-area');
        const historyList = document.getElementById('history-list');
        const hintToastEl = document.getElementById('hintToast');
        const toastMessage = document.getElementById('toastMessage');

        // 토스트 초기화
        const bsToast = new bootstrap.Toast(hintToastEl);

        // 힌트 토스트 출력 함수
        function showToast(message, type) {
            hintToastEl.className = `toast align-items-center border-0 bg-${type} text-${type === 'warning' ? 'dark' : 'white'}`;
            // 닫기 버튼 색상 조정
            const btnClose = hintToastEl.querySelector('.btn-close');
            if (type === 'warning') {
                btnClose.classList.remove('btn-close-white');
            } else {
                btnClose.classList.add('btn-close-white');
            }
            toastMessage.innerHTML = message;
            bsToast.show();
        }

        // 새로운 문제 출제
        function startNewRound() {
            if(gameState.round > TOTAL_ROUNDS) {
                showFinalResult();
                return;
            }

            document.getElementById('current-round').textContent = gameState.round;

            targetSteps.r = Math.floor(Math.random() * 7);
            targetSteps.g = Math.floor(Math.random() * 7);
            targetSteps.b = Math.floor(Math.random() * 7);

            boxTarget.style.backgroundColor = `rgb(${rgbSteps[targetSteps.r]}, ${rgbSteps[targetSteps.g]}, ${rgbSteps[targetSteps.b]})`;

            // 슬라이더 초기화
            sliderR.value = 3;
            sliderG.value = 3;
            sliderB.value = 3;
            updateSliderLabels();

            failCount = 0; 
            attemptCount = 0;
            isCorrect = false;
            
            resetToPlayState();
        }

        // 플레이 상태(제출 전, 혹은 슬라이더 조작 중) UI 세팅
        function resetToPlayState() {
            sliderR.disabled = false;
            sliderG.disabled = false;
            sliderB.disabled = false;

            boxUser.classList.add('hidden-color');
            iconQuestion.style.display = 'block';
            boxUser.style.backgroundColor = '';

            btnAction.disabled = false;
            btnAction.classList.remove('btn-success', 'btn-secondary', 'btn-warning');
            btnAction.classList.add('btn-primary');
            btnAction.innerHTML = '<i class="bi bi-check-circle"></i> 제출하고 색상 확인하기';
            
            isSubmitted = false;
        }

        // 슬라이더 조작 시 발생 (자동 다시 도전 적용)
        function updateSliderLabels() {
            valR.textContent = sliderR.value + "단계";
            valG.textContent = sliderG.value + "단계";
            valB.textContent = sliderB.value + "단계";

            actualR.textContent = rgbSteps[sliderR.value];
            actualG.textContent = rgbSteps[sliderG.value];
            actualB.textContent = rgbSteps[sliderB.value];

            // 오답인 상태에서 슬라이더를 만지면 자동으로 다시 도전 모드로 즉각 복구
            if (isSubmitted && !isCorrect) {
                resetToPlayState();
                resultArea.classList.add('d-none');
            }
        }

        sliderR.addEventListener('input', updateSliderLabels);
        sliderG.addEventListener('input', updateSliderLabels);
        sliderB.addEventListener('input', updateSliderLabels);

        // 제출 버튼 클릭 제어
        btnAction.addEventListener('click', () => {
            if (!isSubmitted && !isCorrect) {
                submitAnswer();
            }
        });

        // 답안 제출 및 결과/힌트 확인 로직
        function submitAnswer() {
            attemptCount++;

            const userSteps = {
                r: parseInt(sliderR.value),
                g: parseInt(sliderG.value),
                b: parseInt(sliderB.value)
            };

            // 내 색상 공개
            boxUser.classList.remove('hidden-color');
            iconQuestion.style.display = 'none';
            const userRgbStr = `rgb(${rgbSteps[userSteps.r]}, ${rgbSteps[userSteps.g]}, ${rgbSteps[userSteps.b]})`;
            boxUser.style.backgroundColor = userRgbStr;

            // 거리 계산 (최대 거리: sqrt(6^2 + 6^2 + 6^2))
            const rDiff = targetSteps.r - userSteps.r; 
            const gDiff = targetSteps.g - userSteps.g;
            const bDiff = targetSteps.b - userSteps.b;
            
            const distance = Math.sqrt(rDiff * rDiff + gDiff * gDiff + bDiff * bDiff);
            const maxDistance = Math.sqrt(6 * 6 * 3); 
            
            // 점수 계산 (항상 100점 만점 기준)
            let score = Math.round((1 - (distance / maxDistance)) * 100);
            if (score < 0) score = 0;

            // 정답 판정 (거리가 0일 때)
            isCorrect = (distance === 0);

            document.getElementById('score-display').textContent = score + "점";
            
            // 시도 기록 추가
            addHistoryLog(userSteps, userRgbStr, score);

            const diffs = [
                { name: 'Red(빨강)', val: rDiff },
                { name: 'Green(초록)', val: gDiff },
                { name: 'Blue(파랑)', val: bDiff }
            ];
            diffs.sort((a, b) => Math.abs(b.val) - Math.abs(a.val));
            const worstColor = diffs[0];

            if (isCorrect) {
                document.getElementById('feedback-display').innerHTML = "🎉 완벽합니다! <span class='text-success'>잠시 후 다음 문제로 이동합니다...</span>";
                
                sliderR.disabled = true;
                sliderG.disabled = true;
                sliderB.disabled = true;

                btnAction.classList.remove('btn-primary', 'btn-secondary');
                btnAction.classList.add('btn-success');
                btnAction.innerHTML = '<i class="bi bi-check-all"></i> 정답 확인 완료';

                // 자동 다음 라운드 진행
                setTimeout(() => {
                    gameState.scores.push(score);
                    gameState.round++;
                    updateAvgScore();
                    startNewRound();
                }, 2000);

            } else {
                failCount++;
                
                let feedback = "";
                if (score >= 85) feedback = "👏 아주 비슷해요! 슬라이더를 움직여 수정해보세요.";
                else if (score >= 70) feedback = "👍 방향은 맞았어요! 슬라이더를 움직여보세요.";
                else feedback = "🤔 빛의 비율을 한 번 더 고민해 볼까요?";
                document.getElementById('feedback-display').textContent = feedback;

                // 점진적 힌트 토스트 로직
                if (failCount === 3) {
                    let action = worstColor.val > 0 ? "높이는" : "낮추는";
                    showToast(`💡 <b>힌트 1단계:</b> 지금 <b>${worstColor.name} 빛</b>을 <b>${action} 방향</b>으로 조절해보세요!`, "warning");
                } else if (failCount > 3) {
                    let action = worstColor.val > 0 ? "더 올려주면" : "더 내려주면";
                    let stepsOff = Math.abs(worstColor.val);
                    showToast(`💡 <b>힌트 2단계:</b> <b>${worstColor.name} 빛</b>을 <b>${stepsOff}단계 ${action}</b> 훨씬 정확해질 거예요!`, "danger");
                }

                btnAction.classList.remove('btn-primary', 'btn-success');
                btnAction.classList.add('btn-secondary');
                btnAction.disabled = true; 
                btnAction.innerHTML = '<i class="bi bi-sliders"></i> 슬라이더를 움직여 다시 조절해보세요';
            }

            resultArea.classList.remove('d-none');
            isSubmitted = true;
        }

        // 시도 기록 렌더링 (모든 라운드 유지)
        function addHistoryLog(steps, colorStr, score) {
            const placeholder = document.getElementById('history-placeholder');
            if(placeholder) placeholder.remove();

            const li = document.createElement('li');
            li.className = "list-group-item d-flex justify-content-between align-items-center bg-transparent py-3";
            li.innerHTML = `
                <div class="d-flex align-items-center">
                    <span class="badge bg-primary me-2">${gameState.round}R</span>
                    <span class="badge bg-secondary me-3">시도 ${attemptCount}</span>
                    <div class="rounded-circle border border-2 me-3" style="width: 30px; height: 30px; background-color: ${colorStr};"></div>
                    <span class="text-muted small fw-medium">
                        <span class="text-danger">R:${steps.r}</span> / 
                        <span class="text-success">G:${steps.g}</span> / 
                        <span class="text-primary">B:${steps.b}</span>
                    </span>
                </div>
                <span class="fw-bold text-dark fs-5">${score}점</span>
            `;
            // 최신 시도가 위로 오도록 추가
            historyList.prepend(li);
        }

        function updateAvgScore() {
            if (gameState.scores.length === 0) return;
            const avg = Math.round(gameState.scores.reduce((a, b) => a + b, 0) / gameState.scores.length);
            document.getElementById('avg-score').textContent = avg;
        }

        function showFinalResult() {
            document.getElementById('game-section').classList.add('d-none');
            document.getElementById('final-section').classList.remove('d-none');

            const avg = Math.round(gameState.scores.reduce((a, b) => a + b, 0) / gameState.scores.length);
            document.getElementById('final-score').textContent = avg + '점';

            let comment = '';
            if (avg >= 95) comment = '🏆 최고의 컬러 감각! 빛의 마술사네요!';
            else if (avg >= 80) comment = '👏 훌륭해요! 색에 대한 이해도가 매우 높습니다.';
            else if (avg >= 60) comment = '👍 좋은 시도! RGB 혼합 원리를 꽤 파악하셨군요.';
            else comment = '💪 연습하면 나아질 거예요! 다시 도전해볼까요?';
            document.getElementById('final-comment').textContent = comment;
        }

        document.getElementById('btn-restart').addEventListener('click', () => {
            gameState.round = 1;
            gameState.scores = [];
            document.getElementById('avg-score').textContent = '-';
            
            // 재도전 시 기록 초기화
            historyList.innerHTML = `<li class="list-group-item text-center text-muted py-4 bg-transparent" id="history-placeholder">
                                        아직 제출한 기록이 없습니다. 색상을 섞어 제출해보세요!
                                     </li>`;
            
            document.getElementById('final-section').classList.add('d-none');
            document.getElementById('game-section').classList.remove('d-none');
            
            startNewRound();
        });

        // 게임 시작
        startNewRound();
    </script>
</body>

</html>
