<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>컬러 이미지 - 이미지 데이터의 표현</title>
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- 네비게이션바 CSS -->
  <link rel="stylesheet" href="../../css/navbar.css">
  <style>
    body {
      background-color: #ffffff;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
    }

    /* 숫자 입력 화살표 제거 */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type=number] {
      -moz-appearance: textfield;
    }

    /* 채널별 포커스 링 스타일 */
    .input-r:focus {
      border-color: #dc3545 !important;
      box-shadow: 0 0 0 0.25rem rgba(220, 53, 69, 0.25) !important;
    }

    .input-g:focus {
      border-color: #198754 !important;
      box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.25) !important;
    }

    .input-b:focus {
      border-color: #0d6efd !important;
      box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25) !important;
    }

    .brush-card {
      background-color: #f8f0fc;
      border: 1px solid #e8d0f5;
    }

    .result-box {
      border: 1px solid #dee2e6;
      border-radius: 8px;
      background-color: #ffffff;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      min-width: 150px;
      min-height: 150px;
    }
  </style>
</head>

<body>

  <!-- 상단 네비게이션바 -->
  <script src="../../js/navbar_aimath.js"></script>

  <div class="container py-4">

    <!-- 컨트롤 패널 -->
    <div class="card border-0 shadow-sm mb-4 bg-light">
      <div class="card-body p-4">
        <div class="row align-items-center g-3">
          <!-- 가로/세로 입력 및 새로만들기 -->
          <div class="col-lg-6 col-12 d-flex flex-wrap align-items-center gap-3">
            <div class="d-flex align-items-center gap-2">
              <label class="small fw-semibold text-secondary">가로 픽셀</label>
              <input type="number" id="cols" value="4" min="1" max="11" class="form-control form-control-sm text-center"
                style="width: 60px;">
            </div>
            <div class="d-flex align-items-center gap-2">
              <label class="small fw-semibold text-secondary">세로 픽셀</label>
              <input type="number" id="rows" value="4" min="1" max="11" class="form-control form-control-sm text-center"
                style="width: 60px;">
            </div>
            <button id="create-btn" class="btn btn-primary btn-sm fw-bold px-3">
              새로 만들기
            </button>
          </div>

          <!-- 클릭값(브러쉬) 및 합성 버튼 -->
          <div class="col-lg-6 col-12 d-flex flex-wrap align-items-center justify-content-lg-end gap-3">
            <div class="d-flex align-items-center gap-2 brush-card px-3 py-1.5 rounded">
              <span class="fs-5">🖌️</span>
              <label class="small fw-bold text-dark text-nowrap">클릭 값</label>
              <input type="number" id="paint-val" value="255" min="0" max="255"
                class="form-control form-control-sm text-center fw-bold border-purple" style="width: 65px;"
                title="칸을 클릭할 때 이 값이 입력됩니다.">
            </div>

            <button id="merge-btn" class="btn btn-dark btn-sm fw-bold px-4 py-2 shadow-sm">
              이미지 변환 (합성)
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- 메인 워크스페이스 -->
    <div class="row g-4 align-items-start">

      <!-- [입력 영역] R/G/B 카드들 -->
      <div class="col-xl-9 col-lg-8 col-12">
        <div class="row g-3">

          <!-- Red Channel -->
          <div class="col-md-4 col-12">
            <div class="card border-danger-subtle shadow-sm h-100">
              <div class="card-header bg-danger-subtle text-danger fw-bold text-center py-2">
                R (Red) Channel
              </div>
              <div class="card-body p-3 d-flex align-items-center justify-content-center">
                <div id="container-r" class="w-100"></div>
              </div>
            </div>
          </div>

          <!-- Green Channel -->
          <div class="col-md-4 col-12">
            <div class="card border-success-subtle shadow-sm h-100">
              <div class="card-header bg-success-subtle text-success fw-bold text-center py-2">
                G (Green) Channel
              </div>
              <div class="card-body p-3 d-flex align-items-center justify-content-center">
                <div id="container-g" class="w-100"></div>
              </div>
            </div>
          </div>

          <!-- Blue Channel -->
          <div class="col-md-4 col-12">
            <div class="card border-primary-subtle shadow-sm h-100">
              <div class="card-header bg-primary-subtle text-primary fw-bold text-center py-2">
                B (Blue) Channel
              </div>
              <div class="card-body p-3 d-flex align-items-center justify-content-center">
                <div id="container-b" class="w-100"></div>
              </div>
            </div>
          </div>

        </div>
      </div>

      <!-- [결과 영역] -->
      <div class="col-xl-3 col-lg-4 col-12">
        <div class="card border-0 shadow-sm p-4 h-100 text-center">
          <h5 class="fw-bold mb-3 text-secondary text-start">Result (Image)</h5>

          <div class="d-flex align-items-center justify-content-center p-3">
            <div id="container-result"
              class="result-box w-100 p-1 d-flex align-items-center justify-content-center position-relative">
              <span class="text-muted small">결과 대기 중</span>
            </div>
          </div>

          <!-- 안내 문구 -->
          <div class="mt-2">
            <div id="pixel-info" class="small fw-bold text-secondary" style="min-height: 20px;"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const rowsInput = document.getElementById('rows');
      const colsInput = document.getElementById('cols');
      const paintValInput = document.getElementById('paint-val');

      const createBtn = document.getElementById('create-btn');
      const mergeBtn = document.getElementById('merge-btn');

      const containerR = document.getElementById('container-r');
      const containerG = document.getElementById('container-g');
      const containerB = document.getElementById('container-b');
      const containerResult = document.getElementById('container-result');
      const pixelInfo = document.getElementById('pixel-info');

      // 초기 실행
      createAllGrids();

      createBtn.addEventListener('click', createAllGrids);
      mergeBtn.addEventListener('click', updateResultImage);

      // 브러시 값 범위 체크
      paintValInput.addEventListener('change', function () {
        let val = parseInt(this.value);
        if (isNaN(val) || val < 0) this.value = 0;
        if (val > 255) this.value = 255;
      });

      function createAllGrids() {
        const rows = parseInt(rowsInput.value, 10);
        const cols = parseInt(colsInput.value, 10);

        if (rows > 11 || cols > 11) {
          alert('가로와 세로 픽셀은 최대 11까지만 가능합니다.');
          return;
        }
        if (rows < 1 || cols < 1) {
          alert('1부터 11까지의 자연수를 입력해주세요.');
          return;
        }

        createInputTable(containerR, rows, cols, 'red');
        createInputTable(containerG, rows, cols, 'green');
        createInputTable(containerB, rows, cols, 'blue');

        // 결과창 초기화
        containerResult.innerHTML = '';
        createResultPlaceholder(rows, cols);
        pixelInfo.innerText = '';
      }

      function createInputTable(container, rows, cols, colorTheme) {
        container.innerHTML = '';
        const table = document.createElement('table');
        table.className = 'border-collapse w-100';
        table.style.tableLayout = 'fixed';

        let inputStyleClass = '';
        if (colorTheme === 'red') inputStyleClass = 'input-r text-danger border-danger-subtle';
        else if (colorTheme === 'green') inputStyleClass = 'input-g text-success border-success-subtle';
        else if (colorTheme === 'blue') inputStyleClass = 'input-b text-primary border-primary-subtle';

        for (let r = 0; r < rows; r++) {
          const tr = document.createElement('tr');
          for (let c = 0; c < cols; c++) {
            const td = document.createElement('td');
            td.className = 'border border-light-subtle p-0.5';
            td.style.width = `calc(100% / ${cols})`;

            const square = document.createElement('div');
            square.style.position = 'relative';
            square.style.width = '100%';
            square.style.paddingTop = '100%';

            const input = document.createElement('input');
            input.type = 'number';
            input.min = 0;
            input.max = 255;
            input.placeholder = "0";
            input.style.position = 'absolute';
            input.style.top = '0';
            input.style.left = '0';
            input.style.width = '100%';
            input.style.height = '100%';
            input.style.boxSizing = 'border-box';
            input.className = `text-center text-sm border rounded focus:outline-none font-mono ${inputStyleClass}`;

            // 클릭 시 브러쉬값 채우기
            input.addEventListener('click', function () {
              const brushValue = paintValInput.value;
              this.value = brushValue;

              // 클릭 시각적 피드백
              this.classList.add('bg-light');
              setTimeout(() => this.classList.remove('bg-light'), 150);
            });

            // 입력 제한
            input.addEventListener('input', function () {
              if (this.value === '') return;
              let val = parseInt(this.value);
              if (val < 0) this.value = 0;
              if (val > 255) this.value = 255;
            });

            square.appendChild(input);
            td.appendChild(square);
            tr.appendChild(td);
          }
          table.appendChild(tr);
        }
        container.appendChild(table);
      }

      function createResultPlaceholder(rows, cols) {
        const table = document.createElement('table');
        table.className = 'border-collapse w-100';
        table.style.tableLayout = 'fixed';
        for (let r = 0; r < rows; r++) {
          const tr = document.createElement('tr');
          for (let c = 0; c < cols; c++) {
            const td = document.createElement('td');
            td.className = 'border border-light bg-light p-0';
            td.style.width = `calc(100% / ${cols})`;
            const square = document.createElement('div');
            square.style.position = 'relative';
            square.style.width = '100%';
            square.style.paddingTop = '100%';

            const inner = document.createElement('div');
            inner.style.position = 'absolute';
            inner.style.top = '0';
            inner.style.left = '0';
            inner.style.width = '100%';
            inner.style.height = '100%';
            inner.className = 'bg-light-subtle';
            square.appendChild(inner);
            td.appendChild(square);
            tr.appendChild(td);
          }
          table.appendChild(tr);
        }
        containerResult.appendChild(table);
      }

      function updateResultImage() {
        const rows = parseInt(rowsInput.value);
        const cols = parseInt(colsInput.value);

        const inputsR = containerR.querySelectorAll('input');
        const inputsG = containerG.querySelectorAll('input');
        const inputsB = containerB.querySelectorAll('input');

        containerResult.innerHTML = '';
        const table = document.createElement('table');
        table.className = 'border-collapse w-100';
        table.style.tableLayout = 'fixed';
        table.style.cursor = 'crosshair';

        let index = 0;
        for (let r = 0; r < rows; r++) {
          const tr = document.createElement('tr');
          for (let c = 0; c < cols; c++) {
            const td = document.createElement('td');

            const rVal = inputsR[index].value === '' ? 0 : parseInt(inputsR[index].value);
            const gVal = inputsG[index].value === '' ? 0 : parseInt(inputsG[index].value);
            const bVal = inputsB[index].value === '' ? 0 : parseInt(inputsB[index].value);

            td.className = 'border border-secondary-subtle p-0';
            td.style.width = `calc(100% / ${cols})`;

            const square = document.createElement('div');
            square.style.position = 'relative';
            square.style.width = '100%';
            square.style.paddingTop = '100%';

            const inner = document.createElement('div');
            inner.style.position = 'absolute';
            inner.style.top = '0';
            inner.style.left = '0';
            inner.style.width = '100%';
            inner.style.height = '100%';
            inner.style.backgroundColor = `rgb(${rVal}, ${gVal}, ${bVal})`;
            inner.dataset.rgb = `RGB(${rVal}, ${gVal}, ${bVal})`;

            inner.addEventListener('mouseover', function () {
              pixelInfo.textContent = this.dataset.rgb;
              pixelInfo.style.color = 'black';
            });

            square.appendChild(inner);
            td.appendChild(square);
            tr.appendChild(td);
            index++;
          }
          table.appendChild(tr);
        }
        containerResult.appendChild(table);
        pixelInfo.textContent = "마우스를 올리면 픽셀의 RGB 값 확인 가능";
      }
    });
  </script>
</body>

</html>
