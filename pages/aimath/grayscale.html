<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>흑백 이미지</title>
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- 네비게이션바 CSS -->
  <link rel="stylesheet" href="../../css/navbar.css">
  <style>
    body {
      background-color: #ffffff;
      font-family: 'S
 egoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;

    }

    /* CSS 애니메이션 */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-5px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in {
      animation: fadeIn 0.3s ease-out forwards;
    }

    /* 마우스가 있는 장치(PC 등)에서만 호버 효과 적용 */
    @media (hover: hover) {
      .grid-cell:hover:not(.bg-dark) {
        background-color: #f8f9fa;
        /* Bootstrap bg-light-subtle */
      }
    }

    /* 모바일 터치 최적화 클래스 */
    .grid-cell {
      width: 40px;
      height: 40px;
      border: 1px solid #dee2e6;
      cursor: pointer;
      touch-action: manipulation;
      /* 더블탭 줌 방지 -> 즉시 반응 */
      -webkit-tap-highlight-color: transparent;
      /* 모바일 터치 시 파란 박스 제거 */
      transition: background-color 0.1s ease;
    }

    @media (min-width: 576px) {
      .grid-cell {
        width: 48px;
        height: 48px;
      }
    }

    /* 모바일에서 눌렀을 때(Active) 즉각적인 피드백 */
    .grid-cell:active {
      background-color: #e9ecef;
    }

    .grid-cell.bg-dark {
      background-color: #212529 !important;
      /* Bootstrap dark color */
    }

    /* 결과 셀 스타일 */
    .result-cell {
      width: 40px;
      height: 40px;
      text-align: center;
      line-height: 40px;
      border: 1px solid #dee2e6;
      font-family: SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.875rem;
      cursor: default;
    }

    @media (min-width: 576px) {
      .result-cell {
        width: 48px;
        height: 48px;
        line-height: 48px;
      }
    }
  </style>
</head>

<body>

  <!-- 상단 네비게이션바 -->
  <script src="../../js/navbar_aimath.js"></script>

  <div class="container py-4">

    <!-- 그리드 레이아웃 -->
    <div class="row g-4 align-items-start">

      <!-- [왼쪽] 입력 섹션 -->
      <div class="col-lg-6 col-12">
        <div class="card border-0 shadow-sm p-4">
          <div class="mb-3 d-flex align-items-center gap-2">
            <span class="badge bg-primary-subtle text-primary fw-bold px-2 py-1 rounded">Step 1</span>
            <span class="fw-bold text-dark">그림 그리기</span>
          </div>

          <div class="d-flex flex-wrap align-items-center gap-3 mb-4 p-3 bg-light rounded">
            <div class="d-flex align-items-center gap-2">
              <label class="small fw-semibold text-secondary">가로 픽셀</label>
              <input type="number" id="cols" value="7" min="1" max="10" class="form-control form-control-sm text-center"
                style="width: 60px;">
            </div>
            <div class="d-flex align-items-center gap-2">
              <label class="small fw-semibold text-secondary">세로 픽셀</label>
              <input type="number" id="rows" value="7" min="1" max="10" class="form-control form-control-sm text-center"
                style="width: 60px;">
            </div>
            <button id="create-btn" class="btn btn-primary btn-sm fw-bold ms-auto text-nowrap">
              새로 만들기
            </button>
          </div>

          <div id="grid-container" class="d-flex justify-content-center p-4 border border-dashed rounded bg-white"
            style="min-height: 250px;">
            <!-- JS로 생성됨 -->
          </div>
        </div>
      </div>

      <!-- [오른쪽] 결과 섹션 -->
      <div class="col-lg-6 col-12">
        <div class="card border-0 shadow-sm p-4 h-100">
          <div class="mb-3 d-flex align-items-center gap-2">
            <span class="badge bg-success-subtle text-success fw-bold px-2 py-1 rounded">Step 2</span>
            <span class="fw-bold text-dark">행렬 표현</span>
          </div>

          <div class="mb-4">
            <button id="show-matrix-btn"
              class="btn btn-dark w-100 fw-bold py-2 d-flex align-items-center justify-content-center gap-2">
              <span>📊</span> 행렬 변환 결과 보기
            </button>
          </div>

          <div
            class="d-flex flex-column align-items-center justify-content-center bg-light border border-light-subtle rounded p-4"
            style="min-height: 300px;">
            <div id="matrix-output" class="d-none w-100 overflow-x-auto text-center animate-fade-in">
              <div id="matrix-table-wrapper" class="p-2 bg-white rounded border inline-block"></div>
            </div>
            <div id="placeholder-text" class="text-muted small text-center">
              버튼을 누르면 행렬이 표시됩니다.
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const rowsInput = document.getElementById('rows');
      const colsInput = document.getElementById('cols');
      const createBtn = document.getElementById('create-btn');
      const showMatrixBtn = document.getElementById('show-matrix-btn');
      const gridContainer = document.getElementById('grid-container');

      const outputContainer = document.getElementById('matrix-output');
      const outputWrapper = document.getElementById('matrix-table-wrapper');
      const placeholderText = document.getElementById('placeholder-text');

      const blackCellClass = 'bg-dark';

      function createGrid() {
        const rows = parseInt(rowsInput.value, 10);
        const cols = parseInt(colsInput.value, 10);

        if (isNaN(rows) || isNaN(cols) || rows <= 0 || cols <= 0) {
          alert('1부터 10까지의 자연수를 입력해주세요.');
          return;
        }
        if (rows > 10 || cols > 10) {
          alert('가로와 세로 픽셀은 최대 10까지만 가능합니다.');
          return;
        }

        gridContainer.innerHTML = '';
        outputContainer.classList.add('d-none');
        placeholderText.style.display = 'block';
        outputWrapper.innerHTML = '';

        const table = document.createElement('table');
        table.className = 'border-collapse shadow-sm bg-white user-select-none';

        for (let r = 0; r < rows; r++) {
          const tr = document.createElement('tr');
          for (let c = 0; c < cols; c++) {
            const td = document.createElement('td');
            td.className = 'grid-cell';
            tr.appendChild(td);
          }
          table.appendChild(tr);
        }
        gridContainer.appendChild(table);
      }

      function showMatrix() {
        const sourceTable = gridContainer.querySelector('table');
        if (!sourceTable) {
          alert("먼저 표를 만들어주세요.");
          return;
        }

        outputWrapper.innerHTML = '';
        outputContainer.classList.remove('d-none');
        placeholderText.style.display = 'none';

        const resultTable = document.createElement('table');
        resultTable.className = 'border-collapse mx-auto';

        for (let r = 0; r < sourceTable.rows.length; r++) {
          const resultTr = document.createElement('tr');

          for (let c = 0; c < sourceTable.rows[r].cells.length; c++) {
            const sourceCell = sourceTable.rows[r].cells[c];
            const isBlack = sourceCell.classList.contains('bg-dark');
            const value = isBlack ? 0 : 1;
            const resultTd = document.createElement('td');
            resultTd.textContent = value;

            let cellClass = 'result-cell ';
            if (value === 0) {
              cellClass += 'bg-dark text-white fw-bold';
            } else {
              cellClass += 'bg-white text-dark';
            }

            resultTd.className = cellClass;
            resultTr.appendChild(resultTd);
          }
          resultTable.appendChild(resultTr);
        }

        outputWrapper.appendChild(resultTable);

        if (window.innerWidth < 1024) {
          outputContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      }

      function handleGridClick(e) {
        if (e.target.classList.contains('grid-cell')) {
          e.target.classList.toggle(blackCellClass);
        }
      }

      createBtn.addEventListener('click', createGrid);
      showMatrixBtn.addEventListener('click', showMatrix);
      gridContainer.addEventListener('click', handleGridClick);

      createGrid();
    });
  </script>
</body>

</html>
