<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생관리 시스템 - 업무자동화</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- 네비게이션바 공통 CSS -->
    <link rel="stylesheet" href="../../../css/navbar.css">
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css');

        body {
            background-color: #f8f9fa;
            color: #212529;
            font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .container-custom {
            max-width: 1200px; /* 대시보드 뷰를 위해 넓이 확장 */
            background-color: #FFFFFF;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 2rem;
            margin-top: 2rem;
            margin-bottom: 2rem;
        }

        /* AppSheet 임베딩 Iframe 스타일 */
        .appsheet-iframe-wrapper {
            position: relative;
            width: 100%;
            height: 75vh;
            min-height: 600px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            background-color: #f1f5f9;
        }

        .appsheet-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background-color: transparent;
        }

        /* 로딩 스피너 (Iframe 로딩 중 배경 표시) */
        .iframe-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #64748b;
        }
    </style>
</head>
<body>
    <!-- 상단 네비게이션바 (업무자동화 전용) -->
    <script src="../../../js/navbar_automation.js"></script>

    <main class="container container-custom">
        <!-- 헤더 영역 -->
        <div class="text-center mb-4">
            <h1 class="fw-bold text-primary"><i class="bi bi-person-lines-fill"></i> 학생관리 시스템</h1>
            <p class="text-muted">스마트폰과 웹을 연동하여 학생 기록을 간편하고 체계적으로 관리하세요.</p>
        </div>

        <!-- AppSheet 앱 임베딩 영역 -->
        <div class="appsheet-iframe-wrapper shadow-sm">
            <div class="iframe-loading">
                <div class="spinner-border text-primary mb-3" role="status"></div>
                <span class="fw-bold">시스템을 불러오는 중입니다...</span>
            </div>
            <!-- 불필요한 트래킹 파라미터(&_gl=...)를 제거한 깔끔한 AppSheet URL -->
            <iframe 
                class="appsheet-iframe" 
                src="https://www.appsheet.com/portfolio/478869221" 
                allowfullscreen>
            </iframe>
        </div>
    </main>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Iframe 로딩 완료 시 배경 스피너를 숨기는 간단한 스크립트 -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const iframe = document.querySelector('.appsheet-iframe');
            const loading = document.querySelector('.iframe-loading');
            
            iframe.addEventListener('load', () => {
                loading.style.display = 'none';
            });
        });
    </script>
</body>
</html>
