<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>여비정산 신청서 - 업무자동화</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- 네비게이션바 CSS -->
    <link rel="stylesheet" href="../../css/navbar.css">

    <style>
        body {
            background-color: #ffffff;
            color: #212529;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .container-custom {
            max-width: 900px;
            padding: 2rem 1rem;
            margin-top: 1rem;
            margin-bottom: 2rem;
        }

        .section-title {
            border-left: 4px solid #0d6efd;
            padding-left: 10px;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            font-weight: 700;
            font-size: 1.25rem;
        }
    </style>
</head>

<body>
    <!-- 상단 네비게이션바 -->
    <script src="../../js/navbar.js"></script>

    <main class="container container-custom">
        <div class="text-center mb-4">
            <h1 class="fw-bold text-primary"><i class="bi bi-file-earmark-word-fill"></i> 여비정산 신청서</h1>
            <p class="text-muted">엑셀 파일에서 출장 내역을 불러와 여비정산 신청서를 생성합니다.</p>
        </div>

        <!-- 1. 파일 업로드 영역 -->
        <div class="mb-4 p-3 bg-light rounded">
            <h5 class="fw-bold"><i class="bi bi-upload"></i> 1. 파일 업로드</h5>
            <div class="row mt-2">
                <div class="col-12">
                    <label class="form-label fw-bold">NEIS 출장내역 엑셀 파일 업로드</label>
                    <input class="form-control form-control-lg" type="file" id="excelFile" accept=".xlsx, .xls">
                </div>
            </div>
        </div>

        <!-- 2. 대상자 선택 영역 -->
        <div class="mb-4" id="selectorArea" style="display: none;">
            <h5 class="section-title">2. 출장 내역 선택 (여비부지급 제외)</h5>
            <select class="form-select form-select-lg border-primary shadow-sm" id="tripSelector">
                <option value="" selected disabled>출장 내역을 선택해주세요.</option>
            </select>
        </div>

        <!-- 3. 데이터 폼 영역 (초기에 숨김 처리) -->
        <form id="hwpxForm" style="display: none;">
            <h5 class="section-title">3. 기본 정보</h5>
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">소속</label>
                    <input type="text" class="form-control" id="소속" placeholder=" ㅇㅇ중학교">
                </div>
                <div class="col-md-4">
                    <label class="form-label">직급(직위)</label>
                    <!-- 기본값을 '교사'로 고정한 텍스트 입력창 -->
                    <input type="text" class="form-control" id="직급" value="교사">
                </div>
                <div class="col-md-4">
                    <label class="form-label">성명</label>
                    <input type="text" class="form-control" id="성명" placeholder=" 동동">
                </div>
            </div>

            <h5 class="section-title">4. 출장 정보</h5>
            <div class="row g-3">
                <div class="col-md-12">
                    <label class="form-label">일시</label>
                    <input type="text" class="form-control" id="일시" placeholder=" 2026.07.14 16:00 ~ 2026.07.14 20:00">
                </div>
                <div class="col-md-6">
                    <label class="form-label">출장지</label>
                    <input type="text" class="form-control" id="출장지" placeholder=" ㅇㅇ교육지원청">
                </div>
                <div class="col-md-6">
                    <label class="form-label">출장목적</label>
                    <input type="text" class="form-control" id="출장목적" placeholder=" ㅇㅇ 협의회 참석">
                </div>
            </div>

            <h5 class="section-title">5. 운임 정보</h5>
            <!-- 가는 편 운임 -->
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label text-primary fw-bold">출발일</label>
                    <input type="text" class="form-control border-primary" id="출발일" placeholder=" 7/14">
                </div>
                <div class="col-md-3">
                    <label class="form-label text-primary">교통편(출발)</label>
                    <input type="text" class="form-control" id="출발교통편" value="자차">
                </div>
                <div class="col-md-3">
                    <label class="form-label text-primary">출발지</label>
                    <input type="text" class="form-control" id="출발지" placeholder=" 출발지">
                </div>
                <div class="col-md-3">
                    <label class="form-label text-primary">도착지</label>
                    <input type="text" class="form-control" id="도착지" placeholder=" 도착지">
                </div>
            </div>

            <h5 class="section-title">6. 첨부 서류</h5>
            <div class="row g-3 mb-4">
                <div class="col-md-12">
                    <select class="form-select" id="첨부">
                        <option value="주유 영수증 1매." selected>주유 영수증 1매.</option>
                        <option value="하이패스 영수증 1매.">하이패스 영수증 1매.</option>
                        <option value="없음.">없음.</option>
                    </select>
                </div>
            </div>

            <button type="button" class="btn btn-primary btn-lg w-100 fw-bold" onclick="generateHWPX()">
                <i class="bi bi-magic"></i> 여비정산 신청서 생성 및 다운로드
            </button>
        </form>
    </main>

    <!-- 외부 라이브러리 (Excel 처리, Zip 조작, 파일 저장) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <script>
        let filteredData = [];

        // HWPX 템플릿 파일이 위치한 서버 경로
        const TEMPLATE_URL = '../../assets/hwpx/여비정산신청서.hwpx';

        // 엑셀 파일 업로드 이벤트
        document.getElementById('excelFile').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];

                // A, B, C 열 형식으로 데이터 읽기
                const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: "A", defval: "" });

                // 첫 행(헤더) 제외 및 조건 필터링
                // 조건: D열(출장종류)에 '관외' 포함 AND F열(출장목적)에 '여비부지급' 미포함
                filteredData = jsonData.slice(1).filter(row => {
                    const type = row['D'] || "";
                    const purpose = row['F'] || "";
                    return type.includes('관외') && !purpose.includes('여비부지급');
                });

                renderSelector();
            };
            reader.readAsArrayBuffer(file);
        });

        // 드롭다운 렌더링
        function renderSelector() {
            const selector = document.getElementById('tripSelector');
            selector.innerHTML = '<option value="" selected disabled>출장 내역을 선택해주세요.</option>';

            if (filteredData.length === 0) {
                alert("조건에 맞는 출장 내역이 없습니다.");
                document.getElementById('selectorArea').style.display = 'none';
                document.getElementById('hwpxForm').style.display = 'none'; // 데이터 없을 시 폼 숨김
                return;
            }

            filteredData.forEach((row, index) => {
                const name = row['L'];
                const date = row['H'];
                const dest = row['E'];
                const option = document.createElement('option');
                option.value = index;
                option.textContent = `[${name}] ${date} - ${dest}`;
                selector.appendChild(option);
            });

            document.getElementById('selectorArea').style.display = 'block';
            document.getElementById('hwpxForm').style.display = 'block'; // 정상 파싱 완료 시 폼 노출
        }

        // 출장 선택 시 폼에 데이터 맵핑
        document.getElementById('tripSelector').addEventListener('change', function () {
            const index = this.value;
            const row = filteredData[index];

            document.getElementById('소속').value = row['B'];
            document.getElementById('성명').value = row['L'];
            document.getElementById('일시').value = row['H'];
            document.getElementById('출장지').value = row['E'];
            document.getElementById('출장목적').value = row['F'];

            // 출장기간(H열) 파싱하여 출발일 추출 시도 ( 2026.07.14 16:00 ~ ...)
            const dateStr = row['H'] || "";
            const dates = dateStr.match(/\d{4}\.\d{2}\.\d{2}/g);
            if (dates && dates.length >= 1) {
                const startDate = dates[0].substring(5).replace('.', '/'); // 07/14 형태로 변환
                document.getElementById('출발일').value = startDate;
            }
        });

        // HWPX 파일 생성 로직
        async function generateHWPX() {
            const userName = document.getElementById('성명').value;
            if (!userName) {
                alert("성명을 입력해주세요.");
                return;
            }

            const 출발일 = document.getElementById('출발일').value;

            // 치환 딕셔너리 생성
            const replaceDict = {
                "소속": document.getElementById('소속').value,
                "직급": document.getElementById('직급').value,
                "성명": userName,
                "일시": document.getElementById('일시').value,
                "출장지": document.getElementById('출장지').value,
                "출장목적": document.getElementById('출장목적').value,
                "출발일": 출발일,
                "출발교통편": document.getElementById('출발교통편').value,
                "출발지": document.getElementById('출발지').value,
                "도착지": document.getElementById('도착지').value,
                "도착일": 출발일,  // 화면에서 없앤 도착일 데이터를 출발일 값으로 대체 치환
                "도착교통편": "자차", // 화면에서 제거된 도착교통편 기본값 고정
                "첨부": document.getElementById('첨부').value
            };

            // 오늘 날짜 계산
            const today = new Date();
            replaceDict["년"] = today.getFullYear();
            replaceDict["월"] = today.getMonth() + 1;
            replaceDict["일"] = today.getDate();

            try {
                // 로컬 파일(file://) 실행 시 브라우저 보안 정책 제한에 대한 구체적 안내 추가
                if (window.location.protocol === 'file:') {
                    throw new Error("로컬 파일 시스템(file://)의 보안 정책(CORS) 제한으로 인해 HWPX 템플릿 파일을 불러올 수 없습니다.\n\n[해결 방법]\n1. VS Code Live Server 등의 로컬 웹 서버 환경(http://...)에서 실행하시거나,\n2. GitHub Pages 웹 상에 업로드 및 호스팅된 상태에서 페이지를 이용해 주세요.");
                }

                // 1. 서버에 있는 템플릿 파일 다운로드 로드
                const response = await fetch(TEMPLATE_URL);
                if (!response.ok) {
                    throw new Error("서버에서 HWPX 템플릿을 불러오지 못했습니다. 경로를 확인해주세요.");
                }
                const arrayBuffer = await response.arrayBuffer();

                // 2. JSZip으로 압축 해제
                const zip = await JSZip.loadAsync(arrayBuffer);

                // 3. XML 파일들 순회하며 변수명 치환
                for (const [filename, fileData] of Object.entries(zip.files)) {
                    if (filename.startsWith("Contents/section") && filename.endsWith(".xml")) {
                        let xmlText = await fileData.async("string");

                        for (const [key, value] of Object.entries(replaceDict)) {
                            // 정규식을 이용해 모든 {{키}}를 사용자가 폼에 입력한 값으로 치환
                            const regex = new RegExp(`\\{\\{${key}\\}\\}`, 'g');
                            xmlText = xmlText.replace(regex, value || "");
                        }
                        // 치환된 내용으로 덮어쓰기
                        zip.file(filename, xmlText);
                    }
                }

                // 4. 새로운 HWPX 파일 생성 및 브라우저 다운로드 실행
                const blob = await zip.generateAsync({ type: "blob", compression: "DEFLATE" });

                const year = today.getFullYear();
                const month = String(today.getMonth() + 1).padStart(2, '0');
                const day = String(today.getDate()).padStart(2, '0');
                saveAs(blob, `${replaceDict['성명']}_여비정산신청서_${replaceDict['출장']}.hwpx`);

            } catch (error) {
                console.error(error);
                alert(error.message || "파일 생성 중 오류가 발생했습니다. 개발자 도구를 확인하세요.");
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
