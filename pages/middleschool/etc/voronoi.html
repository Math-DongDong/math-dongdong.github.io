<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영역의 분할 - 체험수학</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Navbar CSS -->
    <link rel="stylesheet" href="../../../css/navbar.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css');

        /* ===== 전역 설정 ===== */
        body {
            font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            background-color: #ffffff;
            color: #1e293b;
            margin: 0;
            padding: 0;
        }

        /* ===== 메인 콘텐츠 영역 ===== */
        .main-content {
            max-width: 960px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .page-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }

        .content-card {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        /* ===== 캔버스 래퍼 ===== */
        #canvas-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f1f5f9;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
        }

        canvas {
            touch-action: none;
            cursor: crosshair;
            max-width: 100%;
            height: auto;
            display: block;
        }

        .form-check-label.fw-bold {
            color: #334155;
            cursor: pointer;
        }

        /* 투명도 슬라이더 영역 (오른쪽 정렬 적용) */
        #opacity-row {
            display: none;
            align-items: center;
            justify-content: flex-end;
            /* 오른쪽 정렬 */
            gap: 0.75rem;
            padding: 0.5rem 0;
            margin-top: 0.5rem;
        }

        #opacity-row.visible {
            display: flex;
        }

        #opacitySlider {
            accent-color: #3b82f6;
            width: 140px;
        }
    </style>
</head>

<body>
    <!-- 기존 Navbar JS -->
    <script src="../../../js/navbar.js"></script>
    <div class="main-content">
        <div class="page-header">
            <h1>보로노이 시뮬레이터</h1>
        </div>
        <div class="content-card">
            <!-- 조작 모드 (라디오 버튼) -->
            <div class="p-3 mb-4 bg-light rounded-3 border">
                <div class="d-flex flex-column flex-md-row gap-3 justify-content-center">
                    <label class="text-secondary fw-bold d-flex align-items-center gap-2">
                        <i class="bi bi-mouse-fill"></i> 마우스 조작 모드 선택
                    </label>
                    <div class="form-check d-flex align-items-center gap-2">
                        <input class="form-check-input" type="radio" name="canvasMode" id="modeAdd" value="add" checked>
                        <label class="form-check-label fw-bold" for="modeAdd">
                            <i class="bi bi-plus-circle"></i> 생성점 추가하기
                        </label>
                    </div>
                    <div class="form-check d-flex align-items-center gap-2">
                        <input class="form-check-input" type="radio" name="canvasMode" id="modeMove" value="move">
                        <label class="form-check-label fw-bold" for="modeMove">
                            <i class="bi bi-arrows-move"></i> 생성점 이동하기
                        </label>
                    </div>
                    <div class="form-check d-flex align-items-center gap-2">
                        <input class="form-check-input" type="radio" name="canvasMode" id="modeLine" value="line">
                        <label class="form-check-label fw-bold" for="modeLine">
                            <i class="bi bi-pen"></i> 직선 그리기
                        </label>
                    </div>
                </div>
            </div>

            <!-- 컨트롤 버튼 영역 -->
            <div class="control-section mb-3">
                <div class="d-flex flex-wrap justify-content-center align-items-center gap-2">
                    <input type="file" id="imageInput" accept="image/*" style="display:none;">

                    <div class="dropdown">
                        <button class="btn btn-outline-primary shadow-sm dropdown-toggle" type="button" id="bgDropdown"
                            data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-image"></i> 배경 불러오기
                        </button>
                        <ul class="dropdown-menu" aria-labelledby="bgDropdown">
                            <li><a class="dropdown-item" href="#" onclick="loadBgFromUrl('서빙 경로.PNG'); return false;"><i
                                        class="bi bi-cup-hot me-2"></i>서빙 경로</a></li>
                            <li><a class="dropdown-item" href="#"
                                    onclick="loadBgFromUrl('전염병 확산지.PNG'); return false;"><i
                                        class="bi bi-virus me-2"></i>전염병 확산지</a></li>
                            <li><a class="dropdown-item" href="#" onclick="loadBgFromUrl('축구장.PNG'); return false;"><i
                                        class="bi bi-dribbble me-2"></i>축구장</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" href="#"
                                    onclick="document.getElementById('imageInput').click(); return false;"><i
                                        class="bi bi-folder2-open me-2"></i>내 파일에서 불러오기</a></li>
                        </ul>
                    </div>
                    <button class="btn btn-outline-danger shadow-sm" id="clearBtn">
                        <i class="bi bi-trash"></i> 초기화
                    </button>
                    <button class="btn btn-outline-success shadow-sm" id="copyCanvasBtn">
                        <i class="bi bi-clipboard-image"></i> 이미지 복사
                    </button>
                    <div class="form-check form-switch ms-md-3 d-flex align-items-center">
                        <input class="form-check-input me-2" type="checkbox" id="delaunayChk"
                            style="width: 2.5em; height: 1.25em; cursor: pointer;">
                        <label class="form-check-label fw-bold" for="delaunayChk" style="cursor: pointer;">델로네 삼각분할
                        </label>
                    </div>
                </div>
            </div>

            <!-- 캔버스 영역 -->
            <div id="canvas-container">
                <canvas id="mainCanvas"></canvas>
            </div>

            <!-- 캔버스 아래 오른쪽 정렬된 슬라이더 -->
            <div id="opacity-row">
                <label class="fw-bold text-secondary small d-flex align-items-center gap-1">
                    <i class="bi bi-circle-half"></i> 배경 투명도
                </label>
                <input type="range" id="opacitySlider" min="0" max="100" value="100">
                <span id="opacityVal" class="text-secondary small fw-bold"
                    style="min-width:36px; text-align:right;">100%</span>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- 캔버스 로직 -->
    <script>
        const imageInput = document.getElementById('imageInput');
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const clearBtn = document.getElementById('clearBtn');
        const delaunayChk = document.getElementById('delaunayChk');
        const copyCanvasBtn = document.getElementById('copyCanvasBtn');
        const opacitySlider = document.getElementById('opacitySlider');
        const opacityVal = document.getElementById('opacityVal');
        const opacityRow = document.getElementById('opacity-row');

        // CORS 에러 우회를 위한 오프스크린(임시) 캔버스 생성
        const offCanvas = document.createElement('canvas');
        const offCtx = offCanvas.getContext('2d');

        // 상태 변수
        let bgImage = null;
        let bgOpacity = 1.0;
        let points = [];
        let lines = [];
        let showDelaunay = false;

        let currentMode = 'add';
        let isDraggingPoint = false;
        let draggingPointIndex = -1;
        let isDrawingLine = false;
        let currentLineStart = null;
        let currentLineEnd = null;

        document.querySelectorAll('input[name="canvasMode"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                currentMode = e.target.value;
            });
        });

        function getRandomColor() {
            return {
                r: Math.floor(Math.random() * 180) + 50,
                g: Math.floor(Math.random() * 180) + 50,
                b: Math.floor(Math.random() * 180) + 50
            };
        }

        function resizeCanvas(imgW, imgH) {
            let targetW = imgW || 800;
            let targetH = imgH || 500;
            canvas.width = targetW;
            canvas.height = targetH;
        }
        resizeCanvas();

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                bgImage = new Image();
                bgImage.onload = () => {
                    resizeCanvas(bgImage.width, bgImage.height);
                    points = [];
                    lines = [];
                    opacityRow.classList.add('visible');
                    opacitySlider.value = 100;
                    opacityVal.textContent = '100%';
                    bgOpacity = 1.0;
                    draw();
                };
                bgImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        opacitySlider.addEventListener('input', () => {
            bgOpacity = opacitySlider.value / 100;
            opacityVal.textContent = opacitySlider.value + '%';
            draw();
        });

        copyCanvasBtn.addEventListener('click', () => {
            canvas.toBlob(blob => {
                const item = new ClipboardItem({ 'image/png': blob });
                navigator.clipboard.write([item]).then(() => {
                    copyCanvasBtn.innerHTML = '<i class="bi bi-check-lg"></i> 복사됨!';
                    copyCanvasBtn.classList.replace('btn-outline-success', 'btn-success');
                    setTimeout(() => {
                        copyCanvasBtn.innerHTML = '<i class="bi bi-clipboard-image"></i> 복사';
                        copyCanvasBtn.classList.replace('btn-success', 'btn-outline-success');
                    }, 2000);
                }).catch(() => alert('클립보드 복사를 지원하지 않는 환경입니다.'));
            });
        });

        function loadBgFromUrl(filename) {
            const basePath = '../../../assets/images/Voronoi_images/';
            const img = new Image();
            img.crossOrigin = 'Anonymous'; // CORS 오류 방지 속성 추가
            img.onload = () => {
                bgImage = img;
                resizeCanvas(img.width, img.height);
                points = [];
                lines = [];
                opacityRow.classList.add('visible');
                opacitySlider.value = 100;
                opacityVal.textContent = '100%';
                bgOpacity = 1.0;
                draw();
            };
            img.onerror = () => alert('이미지를 불러오지 못했습니다. 경로를 확인해주세요.');
            img.src = basePath + filename;
        }

        clearBtn.addEventListener('click', () => {
            bgImage = null;
            points = [];
            lines = [];
            opacityRow.classList.remove('visible');
            opacitySlider.value = 100;
            opacityVal.textContent = '100%';
            bgOpacity = 1.0;
            resizeCanvas();
            draw();
        });

        delaunayChk.addEventListener('change', (e) => {
            showDelaunay = e.target.checked;
            draw();
        });

        function getCanvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX = e.clientX;
            let clientY = e.clientY;

            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else if (e.changedTouches && e.changedTouches.length > 0) {
                clientX = e.changedTouches[0].clientX;
                clientY = e.changedTouches[0].clientY;
            }
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        const handleStart = (e) => {
            e.preventDefault();
            const pos = getCanvasPos(e);
            if (currentMode === 'add') {
                points.push({ x: pos.x, y: pos.y, color: getRandomColor() });
                draw();
            }
            else if (currentMode === 'move') {
                let minDistSq = 400;
                draggingPointIndex = -1;
                for (let i = 0; i < points.length; i++) {
                    const dx = pos.x - points[i].x;
                    const dy = pos.y - points[i].y;
                    const distSq = dx * dx + dy * dy;
                    if (distSq < minDistSq) {
                        minDistSq = distSq;
                        draggingPointIndex = i;
                    }
                }
                if (draggingPointIndex !== -1) {
                    isDraggingPoint = true;
                }
            }
            else if (currentMode === 'line') {
                isDrawingLine = true;
                currentLineStart = pos;
                currentLineEnd = pos;
            }
        };

        const handleMove = (e) => {
            e.preventDefault();
            const pos = getCanvasPos(e);
            if (currentMode === 'move' && isDraggingPoint && draggingPointIndex !== -1) {
                points[draggingPointIndex].x = pos.x;
                points[draggingPointIndex].y = pos.y;
                draw();
            }
            else if (currentMode === 'line' && isDrawingLine) {
                currentLineEnd = pos;
                draw();
            }
        };

        const handleEnd = (e) => {
            e.preventDefault();
            if (currentMode === 'move') {
                isDraggingPoint = false;
                draggingPointIndex = -1;
            }
            else if (currentMode === 'line' && isDrawingLine) {
                const pos = getCanvasPos(e);
                lines.push({ start: currentLineStart, end: pos });
                isDrawingLine = false;
                currentLineStart = null;
                currentLineEnd = null;
                draw();
            }
        };

        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mousemove', handleMove);
        canvas.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('mouseleave', handleEnd);
        canvas.addEventListener('touchstart', handleStart, { passive: false });
        canvas.addEventListener('touchmove', handleMove, { passive: false });
        canvas.addEventListener('touchend', handleEnd, { passive: false });
        canvas.addEventListener('touchcancel', handleEnd, { passive: false });

        function getCircumcircle(p1, p2, p3) {
            const ax = p2.x - p1.x; const ay = p2.y - p1.y;
            const bx = p3.x - p1.x; const by = p3.y - p1.y;
            const d = 2 * (ax * by - ay * bx);
            if (Math.abs(d) < 0.000001) return null;
            const a2 = ax * ax + ay * ay;
            const b2 = bx * bx + by * by;
            const xc = p1.x + (by * a2 - ay * b2) / d;
            const yc = p1.y + (ax * b2 - bx * a2) / d;
            const rSq = (xc - p1.x) * (xc - p1.x) + (yc - p1.y) * (yc - p1.y);
            return { x: xc, y: yc, rSq: rSq };
        }

        function getDelaunayTriangles() {
            const triangles = [];
            const n = points.length;
            if (n < 3) return triangles;
            for (let i = 0; i < n; i++) {
                for (let j = i + 1; j < n; j++) {
                    for (let k = j + 1; k < n; k++) {
                        const cc = getCircumcircle(points[i], points[j], points[k]);
                        if (!cc) continue;
                        let isValid = true;
                        for (let m = 0; m < n; m++) {
                            if (m === i || m === j || m === k) continue;
                            const dx = points[m].x - cc.x;
                            const dy = points[m].y - cc.y;
                            if (dx * dx + dy * dy < cc.rSq - 0.01) {
                                isValid = false; break;
                            }
                        }
                        if (isValid) triangles.push([points[i], points[j], points[k]]);
                    }
                }
            }
            return triangles;
        }

        function draw() {
            const w = canvas.width;
            const h = canvas.height;

            // 오프스크린 캔버스 해상도 동기화
            if (offCanvas.width !== w || offCanvas.height !== h) {
                offCanvas.width = w;
                offCanvas.height = h;
            }

            // 1. 기본 배경 렌더링
            ctx.clearRect(0, 0, w, h);
            if (bgImage) {
                ctx.save();
                ctx.globalAlpha = bgOpacity;
                ctx.drawImage(bgImage, 0, 0, w, h);
                ctx.restore();
            } else {
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, w, h);
            }

            // 2. 보로노이 렌더링 (CORS 우회를 위해 빈 버퍼에 픽셀을 생성 후 캔버스에 합성)
            if (points.length > 0) {
                const imgData = offCtx.createImageData(w, h);
                const data = imgData.data;
                const alphaVal = bgImage ? 115 : 255; // 115 ≈ 약 45% 불투명도

                for (let y = 0; y < h; y++) {
                    for (let x = 0; x < w; x++) {
                        let minDist = Infinity;
                        let closestIndex = 0;
                        for (let i = 0; i < points.length; i++) {
                            const dx = x - points[i].x;
                            const dy = y - points[i].y;
                            const distSq = dx * dx + dy * dy;
                            if (distSq < minDist) {
                                minDist = distSq;
                                closestIndex = i;
                            }
                        }
                        const idx = (y * w + x) * 4;
                        const c = points[closestIndex].color;
                        data[idx] = c.r;
                        data[idx + 1] = c.g;
                        data[idx + 2] = c.b;
                        data[idx + 3] = alphaVal; // 덮어쓰지 않고 투명도 부여
                    }
                }
                offCtx.putImageData(imgData, 0, 0);
                ctx.drawImage(offCanvas, 0, 0); // 메인 캔버스에 블렌딩
            }

            // 3. 델로네 삼각분할선
            if (showDelaunay && points.length >= 2) {
                ctx.strokeStyle = '#00ffff';
                ctx.lineWidth = 1.8;
                if (points.length === 2) {
                    ctx.beginPath();
                    ctx.moveTo(points[0].x, points[0].y);
                    ctx.lineTo(points[1].x, points[1].y);
                    ctx.stroke();
                } else {
                    const triangles = getDelaunayTriangles();
                    triangles.forEach(t => {
                        ctx.beginPath();
                        ctx.moveTo(t[0].x, t[0].y);
                        ctx.lineTo(t[1].x, t[1].y);
                        ctx.lineTo(t[2].x, t[2].y);
                        ctx.closePath();
                        ctx.stroke();
                    });
                }
            }

            // 4. 기준점들 그리기
            points.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 2;
                ctx.stroke();
            });

            // 5. 사용자가 그린 굵은 검정 직선들 그리기
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            lines.forEach(line => {
                ctx.beginPath();
                ctx.moveTo(line.start.x, line.start.y);
                ctx.lineTo(line.end.x, line.end.y);
                ctx.stroke();
            });

            // 임시 선 그리기
            if (isDrawingLine && currentLineStart && currentLineEnd) {
                ctx.beginPath();
                ctx.moveTo(currentLineStart.x, currentLineStart.y);
                ctx.lineTo(currentLineEnd.x, currentLineEnd.y);
                ctx.stroke();
            }
        }
        draw();
    </script>
</body>

</html>
