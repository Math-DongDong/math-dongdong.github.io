<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주사위 모음 - 보드게임</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../../css/navbar.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css');

        /* ===== 전역 설정 ===== */
        body {
            font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            background-color: #ffffff;
            color: #1e293b;
            margin: 0;
            padding: 0;
        }

        /* ===== 메인 콘텐츠 영역 ===== */
        .main-content {
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .page-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }

        .page-header p {
            color: #64748b;
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        /* ===== 스트림릿 스타일 Pills 커스텀 ===== */
        .pill-btn {
            border-radius: 50rem !important;
            padding: 0.375rem 1rem;
            font-weight: 600;
        }
        
        .pill-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        /* ===== 주사위 디스플레이 영역 ===== */
        .dice-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 5rem; /* 데스크탑 기본 가로 간격 */
            min-height: 350px;
            background-color: #f8fafc;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            margin: 2rem 0;
            padding: 2rem;
            transition: all 0.3s ease-in-out;
        }

        .dice-item {
            font-weight: 800;
            transition: color 0.1s ease-in-out;
            text-align: center;
            line-height: 1.2;
            color: #1e293b;
        }
        
        /* 결과 강조 색상 */
        .dice-result {
            color: #1E88E5 !important;
        }
        
        /* 주사위 내 연산자 기호 사이즈 조정 */
        .dice-item small {
            font-size: 0.6em;
            vertical-align: baseline;
            margin-right: 0.2rem;
        }

        /* 버튼 쉐도우 */
        .btn-roll {
            font-size: 1.25rem;
            font-weight: 700;
            padding: 1rem;
            border-radius: 12px;
        }

        /* ===== 모바일 화면 최적화 (세로 정렬 미디어 쿼리 추가) ===== */
        @media (max-width: 576px) {
            .dice-container {
                flex-direction: column; /* 세로 정렬 */
                gap: 2.5rem;            /* 모바일 세로 배치용 간격 축소 */
                min-height: 480px;      /* 세로 정렬 시 길어지는 영역을 위한 높이 설정 */
                padding: 3rem 1.5rem;
            }

            .dice-item {
                font-size: 5rem !important; /* 모바일에서 텍스트가 넘치지 않도록 글자 크기 축소 */
            }
        }
    </style>
</head>
<body>
    <script src="../../../js/navbar.js"></script>

    <div class="main-content">
        <div class="page-header text-center text-md-start">
            <h1>🎲 주사위 모음</h1>
        </div>

        <!-- 주사위 설정 (아코디언) -->
        <div class="accordion mb-4 shadow-sm" id="settingsAccordion">
            <div class="accordion-item border-0 border-bottom">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed fw-bold bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#collapseSettings">
                        ⚙️ 주사위 설정 열기
                    </button>
                </h2>
                <div id="collapseSettings" class="accordion-collapse collapse">
                    <div class="accordion-body">
                        <div class="row g-4">
                            <!-- 1. 연산 기호 -->
                            <div class="col-md-5">
                                <label class="fw-bold mb-2">1. 연산 기호 <span class="text-muted fw-normal">(다중 선택 가능)</span></label>
                                <div class="pill-group">
                                    <input type="checkbox" class="btn-check op-check" id="opAdd" value="➕" autocomplete="off">
                                    <label class="btn btn-outline-secondary pill-btn" for="opAdd">➕ 덧셈</label>

                                    <input type="checkbox" class="btn-check op-check" id="opSub" value="➖" autocomplete="off">
                                    <label class="btn btn-outline-secondary pill-btn" for="opSub">➖ 뺄셈</label>

                                    <input type="checkbox" class="btn-check op-check" id="opMul" value="✖️" autocomplete="off">
                                    <label class="btn btn-outline-secondary pill-btn" for="opMul">✖️ 곱셈</label>

                                    <input type="checkbox" class="btn-check op-check" id="opDiv" value="➗" autocomplete="off">
                                    <label class="btn btn-outline-secondary pill-btn" for="opDiv">➗ 나눗셈</label>

                                    <input type="checkbox" class="btn-check op-check" id="opNone" value="none" autocomplete="off" checked>
                                    <label class="btn btn-outline-secondary pill-btn" for="opNone">🚫 없음</label>
                                </div>
                            </div>

                            <!-- 2. 부호 포함 여부 -->
                            <div class="col-md-3">
                                <label class="fw-bold mb-2">2. 부호(+, -) 포함 여부</label>
                                <div class="pill-group">
                                    <input type="radio" class="btn-check" name="signOpt" id="signInc" value="true" autocomplete="off">
                                    <label class="btn btn-outline-secondary pill-btn" for="signInc">포함</label>

                                    <input type="radio" class="btn-check" name="signOpt" id="signExc" value="false" autocomplete="off" checked>
                                    <label class="btn btn-outline-secondary pill-btn" for="signExc">미포함</label>
                                </div>
                            </div>

                            <!-- 3. 주사위 개수 -->
                            <div class="col-md-4">
                                <label class="fw-bold mb-2 d-flex justify-content-between">
                                    <span>3. 주사위 개수</span>
                                    <span id="diceCountLabel" class="text-primary">1개</span>
                                </label>
                                <input type="range" class="form-range" id="diceCount" min="1" max="3" step="1" value="1">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 굴리기 버튼 -->
        <button id="rollBtn" class="btn btn-primary w-100 btn-roll shadow-sm mb-4">🎲 주사위 굴리기</button>

        <!-- 디스플레이 영역 -->
        <div id="diceDisplay" class="dice-container">
            <div class="dice-item" style="font-size: 8rem;">❔</div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- 주사위 코어 로직 -->
    <script>
        // DOM 요소
        const opCheckboxes = document.querySelectorAll('.op-check');
        const opNone = document.getElementById('opNone');
        const diceCountSlider = document.getElementById('diceCount');
        const diceCountLabel = document.getElementById('diceCountLabel');
        const rollBtn = document.getElementById('rollBtn');
        const diceDisplay = document.getElementById('diceDisplay');

        // 상태 변수
        let isRolling = false;

        // --- 1. 이벤트 리스너 설정 ---

        // 슬라이더 라벨 업데이트 및 디스플레이 뷰어 초기화
        diceCountSlider.addEventListener('input', (e) => {
            const count = e.target.value;
            diceCountLabel.innerText = `${count}개`;
            
            if (!isRolling) {
                renderPlaceholder(count);
            }
        });

        // 연산자(Pill) 논리 제어
        opCheckboxes.forEach(cb => {
            cb.addEventListener('change', (e) => {
                const targetId = e.target.id;
                const isChecked = e.target.checked;

                if (targetId === 'opNone' && isChecked) {
                    opCheckboxes.forEach(other => {
                        if (other.id !== 'opNone') other.checked = false;
                    });
                } else if (targetId !== 'opNone' && isChecked) {
                    opNone.checked = false;
                }

                const anyChecked = Array.from(opCheckboxes).some(c => c.checked);
                if (!anyChecked) {
                    opNone.checked = true;
                }
            });
        });

        // --- 2. 코어 비즈니스 로직 ---

        // 현재 설정값 읽어오기
        function getSettings() {
            const selectedOps = Array.from(opCheckboxes)
                                    .filter(c => c.checked && c.value !== 'none')
                                    .map(c => c.value);
            const includeSign = document.getElementById('signInc').checked;
            const diceCount = parseInt(diceCountSlider.value);
            
            return { selectedOps, includeSign, diceCount };
        }

        // 1개의 주사위 페이스 생성
        function generateDiceFace(opsList, includeSign) {
            let opStr = "";
            if (opsList.length > 0) {
                opStr = opsList[Math.floor(Math.random() * opsList.length)] + " ";
            }

            let signStr = "";
            if (includeSign) {
                signStr = Math.random() < 0.5 ? "+" : "-";
            }

            const num = Math.floor(Math.random() * 6) + 1;

            let numPart = `${signStr}${num}`;
            if (signStr && opStr) {
                numPart = `(${numPart})`;
            }

            const opHtml = opStr ? `<small>${opStr}</small>` : '';
            return `${opHtml}${numPart}`;
        }

        // 평상시 대기 화면 렌더링
        function renderPlaceholder(count) {
            diceDisplay.innerHTML = '';
            const fontSize = count == 1 ? '8rem' : '6rem';
            for (let i = 0; i < count; i++) {
                const el = document.createElement('div');
                el.className = 'dice-item';
                el.style.fontSize = fontSize;
                el.innerHTML = '❔';
                diceDisplay.appendChild(el);
            }
        }

        // 굴리기 애니메이션 및 결과 출력
        function rollDice() {
            if (isRolling) return;
            isRolling = true;
            rollBtn.disabled = true;

            const { selectedOps, includeSign, diceCount } = getSettings();
            const totalSteps = 15;
            const startDelay = 50;  
            const endDelay = 400;   
            let currentStep = 0;

            diceDisplay.innerHTML = '';
            const diceElements = [];
            const fontSize = diceCount == 1 ? '8rem' : '6rem';

            for (let i = 0; i < diceCount; i++) {
                const el = document.createElement('div');
                el.className = 'dice-item';
                el.style.fontSize = fontSize;
                diceDisplay.appendChild(el);
                diceElements.push(el);
            }

            function step() {
                for (let i = 0; i < diceCount; i++) {
                    diceElements[i].innerHTML = generateDiceFace(selectedOps, includeSign);
                }

                currentStep++;
                
                if (currentStep < totalSteps) {
                    const progress = currentStep / totalSteps;
                    const currentDelay = startDelay + (progress * (endDelay - startDelay));
                    setTimeout(step, currentDelay);
                } else {
                    for (let i = 0; i < diceCount; i++) {
                        diceElements[i].innerHTML = generateDiceFace(selectedOps, includeSign);
                        diceElements[i].classList.add('dice-result'); 
                    }
                    isRolling = false;
                    rollBtn.disabled = false;
                }
            }

            step();
        }

        rollBtn.addEventListener('click', rollDice);

    </script>
</body>
</html>
