    <style>

    background-color: #ffffff;
    color: #1e293b;
    margin: 0;
    padding: 0;
}

/* ===== 상단 네비게이션 바 (부트스트랩 5 커스텀 스타일) ===== */

}

/* 드롭다운 토글 및 드롭다운 아이템 호버 및 활성화 커스텀 */
.navbar-nav .nav-link {

    padding: 0.5rem 0.8rem !important;
}

.navbar-nav .nav-link:hover {
    background-color: #f1f5f9;
    color: #1e293b !important;
}

.navbar-nav .nav-link.active {

}

.dropdown-menu {

}

.dropdown-item {
    color: #475569;
    font-size: 0.875rem;

}

.dropdown-item:hover {

}

.dropdown-item.active {
    background-color: #f0f0ff;

    border: 1px solid #e2e8f0;
    border-radius: 12px;

}

/* 준비 중 안내 메시지 */

}

.coming-soon i {

}

    margin-bottom: 0.5rem;
}

.coming-soon p {
    font-size: 1rem;
}

/* ===== 모바일 반응형 ===== */

    }

@media (max-width: 480px) {

    }

        font-size: 0.75rem;
        padding: 0.3rem 0.4rem;
    }
}

/* ===== 성냥개비 퍼즐 커스텀 스타일 ===== */

/* 메인 영역 너비 확장 (첨부파일의 넓은 화면 비율 반영) */
.main-content {
    max-width: 1200px !important;
}

/* 성냥개비 퍼즐 타이틀 스타일 */
.matchstick-title {
    text-align: center;
    color: #d97706;
    font-weight: 700;
    font-size: 2.3rem;
}

/* 캔버스 기본 스타일 */
#drawCanvas {
    width: 100%;
    max-height: 470px;
    border: 2px solid #cbd5e1;
    border-radius: 12px;
    touch-action: none;
    /* 모바일 기기 터치 스크롤 방지 */
    background-color: #ffffff;
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    cursor: crosshair;
}

/* 모바일 화면 대응 스타일 */
@media (max-width: 768px) {
    #drawCanvas {
        max-height: 470px;
        min-height: 470px;
        aspect-ratio: auto;
    }
}

/* 현황판 카드 스타일 */
.dashboard-card {
    background-color: #f8fafc;
    /* bg-slate-50 */
    padding: 1.5rem;
    border-radius: 0.75rem;
    /* rounded-xl */
    border: 1px solid #e2e8f0;
    /* border-slate-200 */
    box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 1px 2px -1px rgba(0, 0, 0, 0.05);

}

@media (min-width: 768px) {
    .dashboard-card {
        display: flex;
        flex-direction: column;
        flex-grow: 1;
        /* 데스크톱에서 남은 세로 공간을 채워 큰 빈 공간 제거 */

/* 반응형 스탯 배치 */

    flex-direction: row;
    justify-content: space-around;
    text-align: center;
    gap: 0.5rem;
}

@media (min-width: 768px) {
    .dashboard-stats-container {
        flex-direction: column;
        justify-content: space-around;

        flex-grow: 1;
        height: 100%;
        gap: 0;

}

/* 스탯 내부 항목 레이블 */

    font-size: 0.8rem;

}

}

    font-weight: 700;

@media (min-width: 768px) {

/* 그리기 도구 버튼 스타일 */

/* 그리기 도구 활성화 스타일 */

/* 모두 지우기 버튼 스타일 */
.btn-clear {
    background-color: #fef2f2;
    /* bg-red-50 */

    /* text-red-600 */

    /* border-red-200 */
    border-radius: 8px;
    /* rounded-lg */
    padding: 6px 12px;
    font-size: 0.9rem;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
}

.btn-clear:hover {
    background-color: #fee2e2;
    /* bg-red-100 */
}

<body>
    <script src="../../../js/navbar.js"></script>

    <!-- 메인 콘텐츠 영역 -->
    <div class="main-content">

        <header class="mb-5 mt-2">

        </header>

        <!-- 게임 진행 구역 -->
        <div id="game-section" class="row g-4">
            <!-- 왼쪽: 현황 판 및 게임 제어 버튼 -->
            <div class="col-lg-3 col-md-4 d-flex flex-column gap-2 left-panel-container">
                <!-- 현황판 카드 (반응형: 데스크톱에서는 세로 배치, 모바일에서는 가로 배치) -->
                <div class="dashboard-card">
                    <div class="dashboard-stats-container">
                        <div>
                            <span class="stat-label">총 문제</span>
                            <div id="total-cnt" class="stat-val text-dark">0</div>
                        </div>
                        <div>
                            <span class="stat-label">해결한 문제</span>
                            <div id="solved-cnt" class="stat-val text-success">0</div>
                        </div>
                        <div>
                            <span class="stat-label">다시 본 문제</span>
                            <div id="unknown-cnt" class="stat-val text-warning">0</div>
                        </div>
                        <div>
                            <span class="stat-label">남은 문제</span>

                <!-- 제어 버튼 목록 (데스크톱에서 아래 라인을 캔버스와 맞추기 위해 mt-md-auto 사용) -->
                <div class="d-grid gap-2 mt-md-auto">
                    <button onclick="markUnknown()" class="btn-later">
                        ❓ 나중에 풀기
                    </button>
                    <button onclick="markSolved()" class="btn-solved">

                    </button>

            </div>

            <!-- 오른쪽: 그림판 캔버스 영역 -->
            <div class="col-lg-9 col-md-8 d-flex flex-column">
                <!-- 캔버스 조작 헤더 -->
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                    <div class="fw-bold" style="font-size: 0.9rem; color: #1e293b;">💡 화면에 바로 그려서 풀어보세요!</div>
                    <div class="d-flex gap-2 flex-wrap">
                        <button id="btn-line" class="tool-btn active" onclick="setTool('line')">📏 직선</button>
                        <button id="btn-pen" class="tool-btn" onclick="setTool('pen')">✏️ 자유선</button>
                        <button id="btn-eraser" class="tool-btn" onclick="setTool('eraser')">🧽 지우개</button>

        <!-- 게임 완료 구역 -->
        <div id="end-section"
            class="d-none text-center p-5 bg-success bg-opacity-10 border border-success border-opacity-25 rounded-3 mt-4 shadow-sm">
            <div class="display-3 mb-3">🎉</div>
            <h2 class="fw-bold text-success mb-3">모든 문제를 완료했습니다! 정말 수고하셨습니다.</h2>
            <button onclick="restartGame()" class="btn btn-success fw-bold px-4 py-2 mt-2 shadow">
                🔄 처음부터 다시하기
            </button>
        </div>
    </div>

    <!-- Bootstrap 및 기능 구현을 위한 스크립트 파일들 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
/**
 * matchstick.js
 * 성냥개비 퍼즐 보드게임의 드로잉 캔버스 및 게임 진행 로직을 담당하는 스크립트
 */

document.addEventListener('DOMContentLoaded', () => {
    // 성냥개비 퍼즐 이미지 목록 생성 (1.PNG ~ 52.PNG)
    const originalProblems = [];
    for (let i = 1; i <= 52; i++) {
        originalProblems.push(`../../assets/images/matchstickpuzzle/${i}.PNG`);
    }

    let problemPool = [];      
    let solvedCount = 0;
    let unknownCount = 0;
    let currentProblemUrl = null;

    // DOM 요소 가져오기
    const gameSection = document.getElementById('game-section');
    const endSection = document.getElementById('end-section');
    
    const totalCntEl = document.getElementById('total-cnt');
    const solvedCntEl = document.getElementById('solved-cnt');
    const unknownCntEl = document.getElementById('unknown-cnt');
    const remainCntEl = document.getElementById('remain-cnt');

    // 캔버스 요소 및 컨텍스트 초기화
    const canvas = document.getElementById('drawCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    
    let drawing = false;
    let startX = 0, startY = 0;
    let lastX = 0, lastY = 0;
    let currentTool = 'line';
    let savedImageData = null;

    /**
     * 배열을 랜덤하게 섞는 셔플 함수
     */
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    /**
     * 게임 재시작 함수
     */
    window.restartGame = function() {
        problemPool = [...originalProblems];
        shuffle(problemPool);
        solvedCount = 0;
        unknownCount = 0;
        
        endSection.classList.add('d-none');
        gameSection.classList.remove('d-none');

        nextProblem();
    };

    /**
     * 다음 문제로 넘어가는 함수
     */
    function nextProblem() {
        if (problemPool.length === 0) {
            gameSection.classList.add('d-none');
            endSection.classList.remove('d-none');
            return;
        }

        currentProblemUrl = problemPool.shift();
        
        // 배경 이미지 설정
        canvas.style.backgroundImage = `url('${encodeURI(currentProblemUrl)}')`;
        clearCanvas(); 
        updateDashboard();
    }

    /**
     * 문제를 해결했을 때 호출되는 함수
     */
    window.markSolved = function() {
        solvedCount++;
        nextProblem();
    };

    /**
     * 나중에 풀기 버튼을 눌렀을 때 호출되는 함수 (문제를 섞어서 다시 풀이에 투입)
     */
    window.markUnknown = function() {
        unknownCount++;
        problemPool.push(currentProblemUrl);
        shuffle(problemPool); 
        nextProblem();
    };

    /**
     * 대시보드 스코어 업데이트 함수
     */
    function updateDashboard() {
        totalCntEl.innerText = originalProblems.length;
        solvedCntEl.innerText = solvedCount;
        unknownCntEl.innerText = unknownCount;
        remainCntEl.innerText = problemPool.length + 1; 
    }

    /**
     * 그리기 도구 설정 함수
     */
    window.setTool = function(tool) {
        currentTool = tool;
        
        // 모든 툴 버튼 비활성화 상태로 스타일 변경
        ['line', 'pen', 'eraser'].forEach(t => {
            const btn = document.getElementById('btn-' + t);
            if (btn) {
                btn.classList.remove('btn-primary', 'text-white');
                btn.classList.add('btn-outline-secondary');
            }
        });
        
        // 선택한 툴 버튼 활성화 스타일 변경
        const activeBtn = document.getElementById('btn-' + tool);
        if (activeBtn) {
            activeBtn.classList.remove('btn-outline-secondary');
            activeBtn.classList.add('btn-primary', 'text-white');
        }
    };

    // 초기 그리기 도구 설정
    setTool('line');

    /**
     * 마우스/터치 위치를 고해상도 캔버스 좌표로 변환하는 함수
     */
    function setPosition(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        let clientX = e.clientX;
        let clientY = e.clientY;

        // 터치 이벤트 대응
        if (e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        }

        return { 
            x: (clientX - rect.left) * scaleX, 
            y: (clientY - rect.top) * scaleY 
        };
    }

    /**
     * 그리기를 시작하는 이벤트 핸들러
     */
    function startDraw(e) {
        drawing = true;
        const pos = setPosition(e);
        startX = pos.x; startY = pos.y;
        lastX = pos.x; lastY = pos.y;

        // 직선 그리기일 경우 이전 캔버스 상태 저장
        if (currentTool === 'line') {
            savedImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        }
    }

    /**
     * 마우스/터치를 움직이는 동안 그리는 이벤트 핸들러
     */
    function draw(e) {
        if (!drawing) return;
        e.preventDefault(); // 스크롤 등 기본 동작 방지
        const pos = setPosition(e);

        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        if (currentTool === 'eraser') {
            ctx.globalCompositeOperation = 'destination-out';
            ctx.lineWidth = 50; 
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            lastX = pos.x; lastY = pos.y;
            
        } else if (currentTool === 'pen') {
            ctx.globalCompositeOperation = 'source-over';
            ctx.strokeStyle = 'rgba(239, 68, 68, 0.8)'; // 반투명 빨간색 자유선
            ctx.lineWidth = 12;
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            lastX = pos.x; lastY = pos.y;
            
        } else if (currentTool === 'line') {
            ctx.globalCompositeOperation = 'source-over';
            ctx.strokeStyle = '#2563eb'; // 파란색 직선
            ctx.lineWidth = 15;
            
            ctx.putImageData(savedImageData, 0, 0); // 직선을 그릴 때 실시간 잔상 초기화
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }
    }

    /**
     * 그리기 완료 핸들러
     */
    function stopDraw() { 
        drawing = false; 
    }

    /**
     * 캔버스 초기화 함수
     */
    window.clearCanvas = function() { 
        ctx.clearRect(0, 0, canvas.width, canvas.height); 
    };

    // 이벤트 리스너 추가 (마우스)
    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('mouseout', stopDraw);
    
    // 이벤트 리스너 추가 (터치 - 모바일)
    canvas.addEventListener('touchstart', startDraw, {passive: false});
    canvas.addEventListener('touchmove', draw, {passive: false});
    canvas.addEventListener('touchend', stopDraw);
    canvas.addEventListener('touchcancel', stopDraw);

    // 게임 시작
    restartGame();
});
</script>
</body>
