    <!-- Bootstrap Icons 적용 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- 공통 및 개별 스타일시트 연결 -->
    <link rel="stylesheet" href="../../css/middleschool.css">
    <link rel="stylesheet" href="../../css/matchstick.css">
</head>

<body>
    <!-- 상단 네비게이션 바 -->
    <nav class="top-navbar">
        <div class="nav-menu-item">
            <button class="nav-menu-btn" type="button">중1 수학 <span class="arrow">▼</span></button>
            <div class="nav-dropdown">
                <a href="plus_minus.html">덧셈, 뺄셈</a>
                <a href="multiply_divide.html">곱셈, 나눗셈</a>
                <a href="polynomial.html">다항식 챌린지</a>
                <a href="read_mind.html">생각을 읽는 마법구슬</a>
                <a href="equation.html">균형을 잡아라</a>
                <a href="rotation.html">회전체 탐구</a>
            </div>
        </div>
        <div class="nav-menu-item">
            <button class="nav-menu-btn" type="button">중2 수학 <span class="arrow">▼</span></button>
            <div class="nav-dropdown"><a href="exponents.html">지수법칙</a></div>
        </div>
        <div class="nav-menu-item">
            <button class="nav-menu-btn" type="button">체험수학 <span class="arrow">▼</span></button>
            <div class="nav-dropdown"><a href="voronoi.html">영역의 분할</a></div>
        </div>
        <div class="nav-menu-item">
            <button class="nav-menu-btn active" type="button">보드게임 <span class="arrow">▼</span></button>
            <div class="nav-dropdown">
                <a href="streams.html">스트림스</a>
                <a href="pig_game.html">Pig Game</a>
                <a href="number_baseball.html">숫자야구</a>
                <a href="matchstick.html" class="active">성냥개비 퍼즐</a>
                <a href="dice.html">주사위 모음</a>
            </div>
        </div>

        <div class="nav-utils">
            <a href="../../index.html" title="메인으로 돌아가기"><i class="bi bi-house-door-fill"></i></a>
        </div>
    </nav>

    <!-- 메인 콘텐츠 영역 -->
    <div class="main-content">
        <!-- 페이지 헤더 (중앙 정렬 및 주황색 타이틀) -->
        <header class="mb-5 mt-2">
            <h1 class="matchstick-title">성냥개비 퍼즐</h1>
        </header>

        <!-- 게임 진행 구역 -->
        <div id="game-section" class="row g-4">
            <!-- 왼쪽: 현황 판 및 게임 제어 버튼 -->
            <div class="col-lg-3 col-md-4 d-flex flex-column gap-2 left-panel-container">
                <!-- 현황판 카드 (반응형: 데스크톱에서는 세로 배치, 모바일에서는 가로 배치) -->
                <div class="dashboard-card">
                    <div class="dashboard-stats-container">
                        <div>
                            <span class="stat-label">총 문제</span>
                            <div id="total-cnt" class="stat-val text-dark">0</div>
                        </div>
                        <div>
                            <span class="stat-label">해결한 문제</span>
                            <div id="solved-cnt" class="stat-val text-success">0</div>
                        </div>
                        <div>
                            <span class="stat-label">다시 본 문제</span>
                            <div id="unknown-cnt" class="stat-val text-warning">0</div>
                        </div>
                        <div>
                            <span class="stat-label">남은 문제</span>
                            <div id="remain-cnt" class="stat-val text-primary">0</div>
                        </div>
                    </div>
                </div>

                <!-- 제어 버튼 목록 (데스크톱에서 아래 라인을 캔버스와 맞추기 위해 mt-md-auto 사용) -->
                <div class="d-grid gap-2 mt-md-auto">
                    <button onclick="markUnknown()" class="btn-later">
                        ❓ 나중에 풀기
                    </button>
                    <button onclick="markSolved()" class="btn-solved">
                        ✅ 해결했습니다!
                    </button>
                </div>
            </div>

            <!-- 오른쪽: 그림판 캔버스 영역 -->
            <div class="col-lg-9 col-md-8 d-flex flex-column">
                <!-- 캔버스 조작 헤더 -->
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                    <div class="fw-bold" style="font-size: 0.9rem; color: #1e293b;">💡 화면에 바로 그려서 풀어보세요!</div>
                    <div class="d-flex gap-2 flex-wrap">
                        <button id="btn-line" class="tool-btn active" onclick="setTool('line')">📏 직선</button>
                        <button id="btn-pen" class="tool-btn" onclick="setTool('pen')">✏️ 자유선</button>
                        <button id="btn-eraser" class="tool-btn" onclick="setTool('eraser')">🧽 지우개</button>
                        <button onclick="clearCanvas()" class="btn-clear">🗑️ 모두 지우기</button>
                    </div>
                </div>
                <!-- 드로잉 캔버스 -->
                <div class="position-relative w-100">
                    <canvas id="drawCanvas" width="1600" height="1200"></canvas>
                </div>
            </div>
        </div>

        <!-- 게임 완료 구역 -->
        <div id="end-section"
            class="d-none text-center p-5 bg-success bg-opacity-10 border border-success border-opacity-25 rounded-3 mt-4 shadow-sm">
            <div class="display-3 mb-3">🎉</div>
            <h2 class="fw-bold text-success mb-3">모든 문제를 완료했습니다! 정말 수고하셨습니다.</h2>
            <button onclick="restartGame()" class="btn btn-success fw-bold px-4 py-2 mt-2 shadow">
                🔄 처음부터 다시하기
            </button>
        </div>
    </div>

    <!-- Bootstrap 및 기능 구현을 위한 스크립트 파일들 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/middleschool.js"></script>
    <script src="../../js/matchstick.js"></script>
</body>

</html>
