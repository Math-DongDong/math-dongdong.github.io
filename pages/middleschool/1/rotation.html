<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회전체 탐구 - 중1 수학</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- 네비게이션바 공통 CSS 연결 -->
    <link rel="stylesheet" href="../../../css/navbar.css">
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css');

        /* ===== 전역 설정 ===== */
        body {
            font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            background-color: #ffffff;
            color: #1e293b;
            margin: 0;
            padding: 0;
        }

        /* ===== 메인 콘텐츠 영역 (너비 1200px 확장) ===== */
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* 페이지 제목 */
        .page-header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }

        .page-header p {
            color: #64748b;
            font-size: 1.05rem;
            margin-bottom: 2rem;
        }

        /* ===== 캔버스 프레임 및 제어기 ===== */
        #canvas-wrapper {
            position: relative;
            width: 100%;
            height: 550px;
            background-color: #fafafa;
            border-radius: 16px;
            border: 1px solid #cbd5e1;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.03);
            transition: height 0.3s ease;
        }

        /* 가로 세로 반응형 세팅 */
        @media (max-width: 991px) {
            #canvas-wrapper {
                height: 420px;
            }
        }

        .main-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 컨트롤 패널 둥근 테두리 및 텍스트 정렬 */
        .settings-panel {
            background-color: #f8fafc;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            padding: 1.5rem;
            height: 100%;
        }

        .form-check-input:checked {
            background-color: #ff4b4b;
            border-color: #ff4b4b;
        }

        .form-range::-webkit-slider-thumb {
            background: #ff4b4b;
        }
        .form-range::-moz-range-thumb {
            background: #ff4b4b;
        }
    </style>
</head>
<body>
    <!-- 공통 네비게이션바 로드 -->
    <script src="../../../js/navbar.js"></script>

    <main class="main-content">
        <div class="page-header text-center text-lg-start">
            <h1>🔄 회전체 탐구</h1>
            <p>평면도형을 회전시켜 입체도형을 형성하고 단면을 자유롭게 관찰해보세요.</p>
        </div>

        <section class="row g-4">
            <!-- 1. 2D/3D 시각화 캔버스 (좌측) -->
            <div class="col-lg-8">
                <div id="canvas-wrapper">
                    <!-- 2D 드로잉 캔버스 -->
                    <canvas id="drawingCanvas" class="main-canvas" style="cursor: crosshair;"></canvas>
                    
                    <!-- Three.js 3D 렌더링 캔버스 -->
                    <canvas id="threeCanvas" class="main-canvas" style="display: none; cursor: grab;"></canvas>
                </div>
            </div>

            <!-- 2. 제어 컨트롤러 패널 (우측) -->
            <div class="col-lg-4">
                <div class="settings-panel d-flex flex-column justify-content-between">
                    <div>
                        <h5 class="fw-bold mb-3 text-dark d-flex align-items-center gap-2">
                            <i class="bi bi-sliders"></i> 시뮬레이터 제어
                        </h5>
                        <p class="text-secondary small mb-2">
                            회전축(빨간 점선) 오른쪽에 좌표를 클릭하여 평면도형을 그립니다. 
                            <strong>[선분]과 [원의 일부]를 선택하여 자유롭게 조합할 수 있습니다.</strong>
                        </p>

                        <!-- 그리기 도구 선택 (선분 / 원의 일부) -->
                        <div class="mb-4">
                            <label class="fw-bold mb-2 text-secondary"><i class="bi bi-palette2"></i> 그리기 도구 선택</label>
                            <div class="btn-group w-100" role="group" aria-label="그리기 모드">
                                <input type="radio" class="btn-check" name="drawMode" id="modeLine" autocomplete="off" checked>
                                <label class="btn btn-outline-primary fw-bold" for="modeLine">
                                    <i class="bi bi-slash-lg"></i> 선분 (직선)
                                </label>

                                <input type="radio" class="btn-check" name="drawMode" id="modeArc" autocomplete="off">
                                <label class="btn btn-outline-primary fw-bold" for="modeArc">
                                    <i class="bi bi-circle-half"></i> 원의 일부 (곡선)
                                </label>
                            </div>
                        </div>

                        <!-- 버튼 컨트롤러 -->
                        <div class="d-flex gap-2 mb-2">
                            <button id="revolveButton" class="btn btn-danger btn-lg flex-fill fw-bold shadow-sm" style="background-color: #ff4b4b; border-color: #ff4b4b;" disabled>
                                <i class="bi bi-arrow-repeat"></i> 회전체 생성
                            </button>
                            <button id="resetButton" class="btn btn-outline-secondary btn-lg flex-fill fw-bold shadow-sm">
                                <i class="bi bi-arrow-counterclockwise"></i> 초기화
                            </button>
                        </div>

                        <!-- 단면 자르기 조작패널 (초기에 가려짐) -->
                        <div id="clippingControls" class="p-3 bg-white rounded-3 border shadow-sm" style="display: none; flex-direction: column; gap: 0.75rem;">
                            <h6 class="fw-bold text-dark mb-3"><i class="bi bi-scissors text-danger"></i> 단면 자르기 기능</h6>
                            
                            <!-- 라디오 버튼 옵션들 -->
                            <div class="form-check">
                                <input class="form-check-input" type="radio" id="clipOff" name="clip-mode" value="off" checked>
                                <label class="form-check-label fw-bold text-secondary" for="clipOff">회전체 탐구 (자르기 없음)</label>
                            </div>
                            
                            <div class="form-check">
                                <input class="form-check-input" type="radio" id="clipHorizontal" name="clip-mode" value="horizontal">
                                <label class="form-check-label fw-bold text-secondary" for="clipHorizontal">회전축에 수직인 평면</label>
                            </div>
                            <!-- 가로 평면 슬라이더 -->
                            <div class="ps-4">
                                <input type="range" class="form-range" id="clipHorizontalSlider" min="-200" max="200" value="0" disabled>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" id="clipVertical" name="clip-mode" value="vertical">
                                <label class="form-check-label fw-bold text-secondary" for="clipVertical">회전축을 포함하는 평면</label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 외부 Three.js 렌더링 모듈 수입 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/geometries/EdgesGeometry.js"></script>

    <!-- 시뮬레이터 비즈니스 로직 스크립트 -->
    <script>
        const canvasWrapper = document.getElementById('canvas-wrapper');
        const drawingCanvas = document.getElementById('drawingCanvas');
        const threeCanvas = document.getElementById('threeCanvas');
        const ctx = drawingCanvas.getContext('2d');

        const revolveButton = document.getElementById('revolveButton');
        const resetButton = document.getElementById('resetButton');
        const clippingControlsUI = document.getElementById('clippingControls');
        const clipOffRadio = document.getElementById('clipOff');
        const clipHorizontalSlider = document.getElementById('clipHorizontalSlider');

        const modeLine = document.getElementById('modeLine');
        const modeArc = document.getElementById('modeArc');

        let points = []; 
        let isShapeClosed = false; 
        let closingType = 'line'; // 마지막 닫힘 연결 유형

        // 실시간 호(Arc) 대기 및 하이라이트 감지 상태 변수
        let isPendingArc = false;
        let isClosingClick = false;
        let pendingP1 = null;
        let pendingP2 = null;
        let currentMousePos = { x: 0, y: 0 };

        let currentDrawMode = 'line'; // 현재 그리기 상태 ('line' 또는 'arc')
        let threeApp = null; 
        let animationFrameId = null; 
        let isGenerating = false; 
        let currentAngle = 0; 
        let GRID_SIZE = 20; 

        const ROTATION_SPEED = 0.05; 
        const POINT_RADIUS = 5; 
        const CLOSING_THRESHOLD = 15; 

        const horizontalPlane = new THREE.Plane(new THREE.Vector3(0, -1, 0), 0);
        const verticalPlane = new THREE.Plane(new THREE.Vector3(-1, 0, 0), 0);
        const globalClippingPlanes = []; 

        // 그리기 도구 선택 리스너
        modeLine.addEventListener('change', () => { currentDrawMode = 'line'; });
        modeArc.addEventListener('change', () => { currentDrawMode = 'arc'; });

        function resizeCanvas() {
            const { width, height } = canvasWrapper.getBoundingClientRect();
            if (drawingCanvas.width !== width || drawingCanvas.height !== height) {
                drawingCanvas.width = width;
                drawingCanvas.height = height;
                threeCanvas.width = width;
                threeCanvas.height = height;
            }
            if (threeApp) {
                threeApp.renderer.setSize(width, height);
                threeApp.camera.aspect = width / height;
                threeApp.camera.updateProjectionMatrix();
            }
            GRID_SIZE = Math.max(20, Math.round(width / 40)); 
            draw2DShape();
        }

        let resizeTimeout; 
        window.addEventListener('resize', () => { 
            clearTimeout(resizeTimeout); 
            resizeTimeout = setTimeout(resizeCanvas, 100); 
        });

        function drawGrid() {
            const centerX = drawingCanvas.width / 2;
            ctx.save();
            ctx.strokeStyle = 'rgba(0,0,0,0.06)';
            ctx.lineWidth = 0.5;
            for (let x = centerX + GRID_SIZE; x < drawingCanvas.width; x += GRID_SIZE) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, drawingCanvas.height); ctx.stroke(); }
            for (let x = centerX - GRID_SIZE; x > 0; x -= GRID_SIZE) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, drawingCanvas.height); ctx.stroke(); }
            for (let y = 0; y < drawingCanvas.height; y += GRID_SIZE) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(drawingCanvas.width, y); ctx.stroke(); }
            ctx.restore();
        }

        function drawYAxis() {
            ctx.save();
            ctx.strokeStyle = 'rgba(255, 75, 75, 0.6)'; 
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(drawingCanvas.width / 2, 0);
            ctx.lineTo(drawingCanvas.width / 2, drawingCanvas.height);
            ctx.stroke();
            ctx.restore();
        }

        // 특정 두 지점을 잇는 짧은 원(minor-arc) 또는 긴 원(major-arc) 경로 정점 산출 함수
        function getArcPoints(p1, p2, arcType, numSegments = 16) {
            const dx = p2.x - p1.x;
            const dy = p2.y - p1.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < 0.001) return [];

            const mx = (p1.x + p2.x) / 2;
            const my = (p1.y + p2.y) / 2;

            // 왼쪽을 가리키는 법선 벡터
            const nlx = -dy / d;
            const nly = dx / d;

            // 현의 왼쪽에 가상의 원 중심 설정 (부풀어 오르는 면이 오른쪽이 되도록 처리)
            const cx = mx + (d / 2) * nlx;
            const cy = my + (d / 2) * nly;
            const r = d / Math.sqrt(2);

            const alpha1 = Math.atan2(p1.y - cy, p1.x - cx);
            const alpha2 = Math.atan2(p2.y - cy, p2.x - cx);

            let diff = alpha2 - alpha1;
            while (diff < -Math.PI) diff += Math.PI * 2;
            while (diff > Math.PI) diff -= Math.PI * 2;

            const pts = [];
            if (arcType === 'minor-arc') {
                for (let j = 1; j <= numSegments; j++) {
                    const t = j / numSegments;
                    const angle = alpha1 + diff * t;
                    pts.push({ x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) });
                }
            } else {
                const majorDiff = (diff > 0) ? (diff - Math.PI * 2) : (diff + Math.PI * 2);
                for (let j = 1; j <= numSegments; j++) {
                    const t = j / numSegments;
                    const angle = alpha1 + majorDiff * t;
                    pts.push({ x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) });
                }
            }
            return pts;
        }

        // 현재 마우스 각도에 따라 짧은 원(minor)인지 긴 원(major)인지 정밀 식별
        function getSelectedArcType(p1, p2, mousePos) {
            const dx = p2.x - p1.x;
            const dy = p2.y - p1.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < 0.001) return 'minor-arc';

            const mx = (p1.x + p2.x) / 2;
            const my = (p1.y + p2.y) / 2;
            const nlx = -dy / d;
            const nly = dx / d;
            const cx = mx + (d / 2) * nlx;
            const cy = my + (d / 2) * nly;

            const alpha1 = Math.atan2(p1.y - cy, p1.x - cx);
            const alpha2 = Math.atan2(p2.y - cy, p2.x - cx);
            const mouseAngle = Math.atan2(mousePos.y - cy, mousePos.x - cx);

            let diff = alpha2 - alpha1;
            while (diff < -Math.PI) diff += Math.PI * 2;
            while (diff > Math.PI) diff -= Math.PI * 2;

            let targetAngle = mouseAngle - alpha1;
            while (targetAngle < -Math.PI) targetAngle += Math.PI * 2;
            while (targetAngle > Math.PI) targetAngle -= Math.PI * 2;

            const isMinor = (diff >= 0) 
                ? (targetAngle >= 0 && targetAngle <= diff)
                : (targetAngle <= 0 && targetAngle >= diff);

            return isMinor ? 'minor-arc' : 'major-arc';
        }
        
        function draw2DShape() {
            ctx.clearRect(0, 0, drawingCanvas.width, drawingCanvas.height);
            drawGrid();
            drawYAxis();
            if (points.length === 0) return;
            ctx.strokeStyle = '#007bff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            
            // 첫 번째 좌표로 이동
            ctx.moveTo(points[0].x, points[0].y);
            
            // 등록된 정점 연결선 순차 드로잉
            for (let i = 1; i < points.length; i++) {
                const p1 = points[i - 1];
                const p2 = points[i];
                if (p2.type === 'minor-arc' || p2.type === 'major-arc') {
                    const pts = getArcPoints(p1, p2, p2.type);
                    pts.forEach(pt => ctx.lineTo(pt.x, pt.y));
                } else {
                    ctx.lineTo(p2.x, p2.y);
                }
            }
            
            // 도형이 닫힌 경우 처리
            if (isShapeClosed) {
                const p1 = points[points.length - 1];
                const p2 = points[0];
                if (closingType === 'minor-arc' || closingType === 'major-arc') {
                    const pts = getArcPoints(p1, p2, closingType);
                    pts.forEach(pt => ctx.lineTo(pt.x, pt.y));
                    ctx.closePath();
                } else {
                    ctx.closePath();
                }
                ctx.fillStyle = 'rgba(0,123,255,0.15)';
                ctx.fill();
            }
            ctx.stroke();

            // 가이드라인 및 선택 점선 실시간 렌더링
            if (!isShapeClosed && points.length > 0) {
                const lastPt = points[points.length - 1];

                if (isPendingArc) {
                    const p1 = pendingP1;
                    const p2 = pendingP2;

                    const minorPts = getArcPoints(p1, p2, 'minor-arc');
                    const majorPts = getArcPoints(p1, p2, 'major-arc');
                    const selectedType = getSelectedArcType(p1, p2, currentMousePos);

                    // 1. 짧은 원 가이드
                    ctx.save();
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    minorPts.forEach(pt => ctx.lineTo(pt.x, pt.y));
                    if (selectedType === 'minor-arc') {
                        ctx.strokeStyle = '#007bff';
                        ctx.lineWidth = 3;
                    } else {
                        ctx.strokeStyle = '#94a3b8';
                        ctx.lineWidth = 1.5;
                        ctx.setLineDash([5, 5]);
                    }
                    ctx.stroke();
                    ctx.restore();

                    // 2. 긴 원 가이드
                    ctx.save();
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    majorPts.forEach(pt => ctx.lineTo(pt.x, pt.y));
                    if (selectedType === 'major-arc') {
                        ctx.strokeStyle = '#007bff';
                        ctx.lineWidth = 3;
                    } else {
                        ctx.strokeStyle = '#94a3b8';
                        ctx.lineWidth = 1.5;
                        ctx.setLineDash([5, 5]);
                    }
                    ctx.stroke();
                    ctx.restore();

                    // 3. 안내 텍스트 가이드
                    ctx.save();
                    ctx.fillStyle = '#2563eb';
                    ctx.font = 'bold 13px Pretendard';
                    ctx.fillText(selectedType === 'minor-arc' ? '짧은 원 (클릭하여 선택)' : '긴 원 (클릭하여 선택)', currentMousePos.x + 15, currentMousePos.y + 15);
                    ctx.restore();
                } else {
                    // 마우스를 클릭하기 전 예비 가이드라인
                    const mousePos = currentMousePos;
                    const centerX = drawingCanvas.width / 2;
                    const offsetX = mousePos.x - centerX;
                    const snappedOffsetX = Math.round(offsetX / GRID_SIZE) * GRID_SIZE;
                    const snappedX = centerX + snappedOffsetX;
                    const snappedY = Math.round(mousePos.y / GRID_SIZE) * GRID_SIZE;

                    ctx.save();
                    ctx.strokeStyle = 'rgba(0, 123, 255, 0.4)';
                    ctx.lineWidth = 1.5;
                    ctx.setLineDash([3, 3]);
                    ctx.beginPath();
                    ctx.moveTo(lastPt.x, lastPt.y);

                    if (currentDrawMode === 'arc') {
                        const p1 = lastPt;
                        const p2 = { x: snappedX, y: snappedY };
                        const minorPts = getArcPoints(p1, p2, 'minor-arc');
                        minorPts.forEach(pt => ctx.lineTo(pt.x, pt.y));
                    } else {
                        ctx.lineTo(snappedX, snappedY);
                    }
                    ctx.stroke();
                    ctx.restore();
                }
            }
            
            // 정점 마커 렌더링
            points.forEach((point, index) => {
                ctx.beginPath();
                ctx.fillStyle = (index === 0) ? '#28a745' : '#dc3545';
                ctx.arc(point.x, point.y, POINT_RADIUS, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        function handleCanvasClick(event) {
            if (isShapeClosed) return;
            const rect = drawingCanvas.getBoundingClientRect();
            const mouseX = event.clientX - rect.left;
            const mouseY = event.clientY - rect.top;
            const pos = { x: mouseX, y: mouseY };

            const centerX = drawingCanvas.width / 2;
            const offsetX = mouseX - centerX;
            const snappedOffsetX = Math.round(offsetX / GRID_SIZE) * GRID_SIZE;
            const snappedX = centerX + snappedOffsetX;
            const snappedY = Math.round(mouseY / GRID_SIZE) * GRID_SIZE;

            // 1. 대기상태(Pending)인 경우: 한 번 더 클릭하여 호 종류 결정
            if (isPendingArc) {
                const selectedType = getSelectedArcType(pendingP1, pendingP2, pos);
                if (isClosingClick) {
                    isShapeClosed = true;
                    closingType = selectedType;
                    revolveButton.disabled = false;
                } else {
                    points.push({ x: pendingP2.x, y: pendingP2.y, type: selectedType });
                }
                isPendingArc = false;
                isClosingClick = false;
                draw2DShape();
                return;
            }

            // 2. 대기상태가 아닌 경우: 직선 또는 곡선 가이드 활성화
            if (currentDrawMode === 'arc' && points.length > 0) {
                const firstPoint = points[0];
                const distance = Math.sqrt(Math.pow(snappedX - firstPoint.x, 2) + Math.pow(snappedY - firstPoint.y, 2));
                isClosingClick = (points.length >= 3 && distance < CLOSING_THRESHOLD);

                isPendingArc = true;
                pendingP1 = points[points.length - 1];
                pendingP2 = isClosingClick ? { x: firstPoint.x, y: firstPoint.y } : { x: snappedX, y: snappedY };
                draw2DShape();
            } else {
                // 선분 그리기 혹은 최초 1점 클릭 로직
                if (points.length >= 3) {
                    const firstPoint = points[0];
                    const distance = Math.sqrt(Math.pow(snappedX - firstPoint.x, 2) + Math.pow(snappedY - firstPoint.y, 2));
                    if (distance < CLOSING_THRESHOLD) {
                        isShapeClosed = true;
                        closingType = 'line';
                        revolveButton.disabled = false;
                        draw2DShape();
                        return;
                    }
                }
                const type = (points.length === 0) ? 'start' : 'line';
                points.push({ x: snappedX, y: snappedY, type: type });
                draw2DShape();
            }
        }

        // 3D 렌더링용 정점 조밀화 처리 (곡선 보간 알고리즘 내장)
        function preparePointsFor3D() {
            const centerX = drawingCanvas.width / 2, centerY = drawingCanvas.height / 2;
            let interpolatedPoints = [];
            
            if (points.length === 0) return [];
            
            // 최초 시작점 삽입
            interpolatedPoints.push(new THREE.Vector2(points[0].x - centerX, -(points[0].y - centerY)));
            
            for (let i = 1; i < points.length; i++) {
                const p1 = points[i - 1];
                const p2 = points[i];
                if (p2.type === 'minor-arc' || p2.type === 'major-arc') {
                    const pts = getArcPoints(p1, p2, p2.type);
                    pts.forEach(pt => {
                        interpolatedPoints.push(new THREE.Vector2(pt.x - centerX, -(pt.y - centerY)));
                    });
                } else {
                    interpolatedPoints.push(new THREE.Vector2(p2.x - centerX, -(p2.y - centerY)));
                }
            }
            
            // 닫히는 마지막 구간 보간 처리
            if (isShapeClosed) {
                const p1 = points[points.length - 1];
                const p2 = points[0];
                if (closingType === 'minor-arc' || closingType === 'major-arc') {
                    const pts = getArcPoints(p1, p2, closingType);
                    pts.forEach(pt => {
                        interpolatedPoints.push(new THREE.Vector2(pt.x - centerX, -(pt.y - centerY)));
                    });
                } else {
                    interpolatedPoints.push(new THREE.Vector2(p2.x - centerX, -(p2.y - centerY)));
                }
            }
            
            return interpolatedPoints;
        }
        
        function init3D() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0xfafafa);
            const camera = new THREE.PerspectiveCamera(75, threeCanvas.width / threeCanvas.height, 0.1, 1000);
            camera.position.set(0, 150, 400);
            const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, antialias: true });
            renderer.localClippingEnabled = true;
            renderer.setSize(threeCanvas.width, threeCanvas.height);
            
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(50, 50, 100);
            scene.add(directionalLight);
            
            const axisMaterial = new THREE.LineBasicMaterial({ color: 0xff4b4b });
            const axisPoints = [new THREE.Vector3(0, -500, 0), new THREE.Vector3(0, 500, 0)];
            const axisGeometry = new THREE.BufferGeometry().setFromPoints(axisPoints);
            const yAxisLine = new THREE.Line(axisGeometry, axisMaterial);
            scene.add(yAxisLine);
            
            const shapePoints = preparePointsFor3D();
            const geometry = new THREE.LatheGeometry(shapePoints, 32, 0, currentAngle);
            const baseColor = new THREE.Color(0x007bff);
            
            const surfaceMaterial = new THREE.MeshStandardMaterial({ 
                color: baseColor, 
                side: THREE.DoubleSide, 
                clippingPlanes: globalClippingPlanes, 
                clipIntersection: true, 
                transparent: true, 
                opacity: 0.7,
                roughness: 0.5,
                metalness: 0.1
            });
            
            const surfaceMesh = new THREE.Mesh(geometry, surfaceMaterial);
            const edgesGeometry = new THREE.EdgesGeometry(geometry, 20);
            const edgesMaterial = new THREE.LineBasicMaterial({ color: 0x004499, clippingPlanes: globalClippingPlanes });
            const edgesMesh = new THREE.LineSegments(edgesGeometry, edgesMaterial);
            
            const group = new THREE.Group();
            group.add(surfaceMesh);
            group.add(edgesMesh);
            scene.add(group);
            group.rotation.y = Math.PI / 2;
            
            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.enabled = false;
            
            return { scene, camera, renderer, lathe: group, controls, shapePoints };
        }
        
        function animate() {
            animationFrameId = requestAnimationFrame(animate);
            if (isGenerating) {
                currentAngle += ROTATION_SPEED;
                if (currentAngle >= Math.PI * 2) {
                    currentAngle = Math.PI * 2;
                    isGenerating = false;
                    clippingControlsUI.style.display = 'flex';
                    threeApp.controls.enabled = true;
                    threeApp.lathe.children[0].material.depthWrite = true;
                }
                const newGeometry = new THREE.LatheGeometry(threeApp.shapePoints, 32, 0, currentAngle);
                const newEdgesGeometry = new THREE.EdgesGeometry(newGeometry, 20);
                const surface = threeApp.lathe.children[0];
                const edges = threeApp.lathe.children[1];
                surface.geometry.dispose();
                edges.geometry.dispose();
                surface.geometry = newGeometry;
                edges.geometry = newEdgesGeometry;
            }
            if (threeApp.controls.enabled) {
                threeApp.controls.update();
            }
            threeApp.renderer.render(threeApp.scene, threeApp.camera);
        }

        revolveButton.addEventListener('click', () => {
            if (!isShapeClosed) return;
            revolveButton.disabled = true;
            resetButton.textContent = "초기화";
            isGenerating = true;
            currentAngle = 0.01;
            
            // 그리기 옵션 잠금
            modeLine.disabled = true;
            modeArc.disabled = true;

            drawingCanvas.style.display = 'none';
            threeCanvas.style.display = 'block';
            threeApp = init3D();
            threeApp.lathe.children[0].material.depthWrite = false;
            animate();
        });

        resetButton.addEventListener('click', () => {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            points = []; isShapeClosed = false; closingType = 'line'; threeApp = null; animationFrameId = null;
            isGenerating = false; currentAngle = 0;
            isPendingArc = false; isClosingClick = false; pendingP1 = null; pendingP2 = null;
            threeCanvas.style.display = 'none';
            drawingCanvas.style.display = 'block';
            clippingControlsUI.style.display = 'none';
            
            // 그리기 모드 복구 및 활성화
            modeLine.disabled = false;
            modeArc.disabled = false;
            modeLine.checked = true;
            currentDrawMode = 'line';

            resizeCanvas();
            revolveButton.disabled = true;
            revolveButton.textContent = "회전체 생성";
            resetButton.innerHTML = '<i class="bi bi-arrow-counterclockwise"></i> 초기화';
            globalClippingPlanes.length = 0;
            clipOffRadio.checked = true;
            clipHorizontalSlider.disabled = true;
            clipHorizontalSlider.value = 0;
            horizontalPlane.constant = 0;
        });

        drawingCanvas.addEventListener('click', handleCanvasClick);

        drawingCanvas.addEventListener('mousemove', (e) => {
            currentMousePos = getCanvasPos(e);
            draw2DShape();
        });

        clippingControlsUI.addEventListener('change', (e) => {
            if (!threeApp) return;
            const selectedMode = document.querySelector('input[name="clip-mode"]:checked').value;
            globalClippingPlanes.length = 0;
            clipHorizontalSlider.disabled = true;
            threeApp.controls.minAzimuthAngle = -Infinity;
            threeApp.controls.maxAzimuthAngle = Infinity;
            if (selectedMode === 'horizontal') {
                globalClippingPlanes.push(horizontalPlane);
                clipHorizontalSlider.disabled = false;
            } else if (selectedMode === 'vertical') {
                verticalPlane.constant = 0;
                globalClippingPlanes.push(verticalPlane);
                threeApp.controls.minAzimuthAngle = Math.PI / 2;
                threeApp.controls.maxAzimuthAngle = Math.PI / 2;
            }
            threeApp.controls.update();
        });

        // 사용자의 마우스/터치 좌표 변환
        function getCanvasPos(e) {
            const rect = drawingCanvas.getBoundingClientRect();
            const scaleX = drawingCanvas.width / rect.width;
            const scaleY = drawingCanvas.height / rect.height;
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        clipHorizontalSlider.addEventListener('input', (e) => {
            horizontalPlane.constant = parseFloat(e.target.value);
        });
        
        // 초기 로드 시 캔버스 스케일 초기화
        document.addEventListener("DOMContentLoaded", () => {
            resizeCanvas();
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
