<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>생각을 읽는 마법구슬 - 중1 수학</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- 네비게이션바 공통 CSS 연결 -->
    <link rel="stylesheet" href="../../../css/navbar.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css');

        /* ===== 전역 설정 ===== */
        body {
            font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            background-color: #ffffff;
            /* 흰색 배경 준수 */
            color: #1e293b;
            margin: 0;
            padding: 0;
        }

        /* ===== 메인 콘텐츠 영역 (1200px 확장형) ===== */
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* 페이지 제목 */
        .page-header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }

        .page-header p {
            color: #64748b;
            font-size: 1.05rem;
            margin-bottom: 2rem;
        }

        /* ===== 플랫 UI/UX 커스텀 요소 ===== */
        .game-area {
            padding: 1rem 0;
        }

        /* 입체적 마법 구슬 효과 */
        .crystal-ball-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 2rem 0;
        }

        .crystal-ball {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffffff 0%, #f1f5f9 50%, #cbd5e1 100%);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5rem;
            user-select: none;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            border: 1px solid #e2e8f0;
        }

        /* 정답 공개 시의 화려한 연출 */
        .crystal-ball.revealed {
            background: radial-gradient(circle at 30% 30%, #fef08a 0%, #e0f2fe 60%, #bae6fd 100%);
            box-shadow: 0 20px 25px -5px rgba(14, 165, 233, 0.3), 0 10px 10px -5px rgba(14, 165, 233, 0.2);
            transform: scale(1.1) rotate(360deg);
        }

        /* 정답 유도 버튼 깜빡임 효과 */
        @keyframes pulse-glow {
            0% {
                box-shadow: 0 0 0 0 rgba(13, 110, 253, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(13, 110, 253, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(13, 110, 253, 0);
            }
        }

        .btn-glow {
            animation: pulse-glow 1.5s infinite;
        }

        /* ===== 마법의 문양 그리드 테이블 ===== */
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            /* 칼각 10x10 배치 */
            gap: 0.5rem;
        }

        .grid-item {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 0.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            font-weight: 700;
            transition: all 0.4s ease;
        }

        .grid-item .num {
            font-size: 0.8rem;
            color: #64748b;
            min-width: 18px;
            text-align: right;
        }

        .grid-item .emoji {
            font-size: 1.4rem;
        }

        /* 모바일 디바이스 최적화 (열 압축 방지 및 화면 넘침 방지) */
        @media (max-width: 768px) {
            .emoji-grid {
                grid-template-columns: repeat(4, 1fr);
                /* 모바일은 4열 배치로 가독성 확보 및 넘침 방지 */
            }
        }
    </style>
</head>

<body>
    <!-- 공통 네비게이션바 로드 -->
    <script src="../../../js/navbar.js"></script>

    <main class="main-content">
        <div class="page-header text-center text-lg-start">
            <h1>🔮 생각을 읽는 마법구슬</h1>
            <p>마법구슬이 여러분이 연산한 결과를 완벽하게 알아맞혀 보겠습니다.</p>
        </div>

        <section class="game-area">
            <div class="row g-4">

                <!-- 1. 제어 및 작동 판넬 (좌측) -->
                <div class="col-lg-4">
                    <div class="d-flex flex-column h-100 justify-content-between">
                        <div>
                            <!-- 조작 버튼 영역 -->
                            <div class="d-flex gap-2 mb-3">
                                <button class="btn btn-outline-secondary flex-fill fw-bold shadow-sm"
                                    onclick="initGame()">
                                    <i class="bi bi-arrow-counterclockwise"></i> 새로하기
                                </button>
                                <button class="btn btn-primary flex-fill fw-bold shadow-sm" id="actionBtn"
                                    onclick="handleAction()">
                                    다음 단계 <i class="bi bi-arrow-right-short"></i>
                                </button>
                            </div>

                            <!-- 단계별 안내 메시지 박스 -->
                            <div id="instructionBox" class="alert shadow-sm fw-bold mb-4"></div>

                            <!-- 마법구슬 구체 인터페이스 -->
                            <div class="crystal-ball-container">
                                <div class="crystal-ball" id="magicSphere">❓</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 2. 마법의 문양 그리드 테이블 (우측) -->
                <div class="col-lg-8">
                    <h5 class="fw-bold text-secondary mb-3 text-center text-lg-start">
                        <i class="bi bi-grid-3x3-gap-fill"></i> 마법의 숫자 및 문양 매칭표
                    </h5>
                    <div class="emoji-grid" id="emojiGrid"></div>
                </div>

            </div>
        </section>
    </main>

    <!-- 게임 구동 비즈니스 로직 스크립트 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        const EMOJIS = ['🍎', '🐶', '🚗', '🎈', '⭐', '🍀', '🌈', '🔥', '💧', '☀️', '🌙', '⛄', '☂️', '🍕', '🎸', '💎', '🚀', '🐢'];

        let mapping = {};
        let targetEmoji = "";
        let step = 1;
        let revealed = false;

        // 피셔-예이츠 셔플 알고리즘
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // 게임 초기 설정 구축 (영리한 더미 분산 처리 탑재)
        function initGame() {
            // 1. 실제 정답(9의 배수용) 이모지 선정 (총 12회 출현 예정)
            const targetIndex = Math.floor(Math.random() * EMOJIS.length);
            targetEmoji = EMOJIS[targetIndex];

            // 2. 남은 이모지 풀 분리 및 셔플
            const remainingEmojis = EMOJIS.filter((_, idx) => idx !== targetIndex);
            shuffle(remainingEmojis);

            // 3. 정답(12회)보다 더 많이 등장할 '가짜 최다 빈도 더미' 이모지들 선정
            const dummy1 = remainingEmojis[0]; // 16회 출현 (전체 타일 중 1위 빈도)
            const dummy2 = remainingEmojis[1]; // 14회 출현 (전체 타일 중 2위 빈도)
            const dummy3 = remainingEmojis[2]; // 13회 출현 (전체 타일 중 3위 빈도)

            // 4. 9의 배수가 아닌 빈칸 인덱스 추출 (총 88칸)
            const nonNineMultiples = [];
            for (let i = 0; i < 100; i++) {
                if (i % 9 !== 0) {
                    nonNineMultiples.push(i);
                }
            }
            shuffle(nonNineMultiples); // 인덱스 순서 무작위 셔플

            mapping = {};

            // 5. 9의 배수 칸은 무조건 진짜 정답(targetEmoji)으로 먼저 채움
            for (let i = 0; i < 100; i++) {
                if (i % 9 === 0) {
                    mapping[i] = targetEmoji;
                }
            }

            // 6. 가짜 최다 빈도 이모지들을 지정된 수량만큼 빈칸에 강제 삽입
            for (let i = 0; i < 16; i++) {
                const idx = nonNineMultiples.pop();
                mapping[idx] = dummy1;
            }
            for (let i = 0; i < 14; i++) {
                const idx = nonNineMultiples.pop();
                mapping[idx] = dummy2;
            }
            for (let i = 0; i < 13; i++) {
                const idx = nonNineMultiples.pop();
                mapping[idx] = dummy3;
            }

            // 7. 남은 45개 빈칸은 나머지 잔여 이모지들로 무작위 분산 처리
            const finalPool = remainingEmojis.slice(3); // 이미 최다 수량으로 소모한 dummy 3개 제외
            while (nonNineMultiples.length > 0) {
                const idx = nonNineMultiples.pop();
                mapping[idx] = finalPool[Math.floor(Math.random() * finalPool.length)];
            }

            step = 1;
            revealed = false;

            updateUI();
        }

        // 제어 액션 분기 처리
        function handleAction() {
            if (step < 4) {
                step++;
                updateUI();
            } else if (step === 4 && !revealed) {
                revealAnswer();
            }
        }

        // 마법구슬 결과 렌더링
        function revealAnswer() {
            revealed = true;
            updateUI();

            // 폭죽 효과 연출
            confetti({
                particleCount: 120,
                spread: 70,
                origin: { y: 0.6 }
            });
        }

        // 프론트엔드 상태 실시간 업데이트
        function updateUI() {
            const actionBtn = document.getElementById("actionBtn");
            const instructionBox = document.getElementById("instructionBox");
            const magicSphere = document.getElementById("magicSphere");

            // 1. 단계별 제어 버튼 갱신
            if (step < 4) {
                actionBtn.className = "btn btn-primary flex-fill fw-bold shadow-sm";
                actionBtn.innerHTML = "다음 단계 <i class='bi bi-arrow-right-short'></i>";
                actionBtn.disabled = false;
            } else if (step === 4 && !revealed) {
                actionBtn.className = "btn btn-danger flex-fill fw-bold shadow-sm btn-glow";
                actionBtn.innerHTML = "✨ 정답은?";
                actionBtn.disabled = false;
            } else {
                actionBtn.className = "btn btn-secondary flex-fill fw-bold shadow-sm";
                actionBtn.innerHTML = "마법 완료";
                actionBtn.disabled = true;
            }

            // 2. 단계별 가이드 박스 갱신 (부트스트랩 컨텍스트 클래스 적용)
            let alertClass = "";
            let guideText = "";
            if (step === 1) {
                alertClass = "alert-success";
                guideText = "① 1부터 99 사이의 숫자 중 하나를 마음속으로 정해보세요.";
            } else if (step === 2) {
                alertClass = "alert-info";
                guideText = "② 정한 숫자의 각 자리 숫자를 더하세요. (예: 34라면 3 + 4 = 7)";
            } else if (step === 3) {
                alertClass = "alert-warning";
                guideText = "③ 처음 생각한 숫자에서 ②의 합산 결과를 빼세요. (예: 34 - 7 = 27)";
            } else if (step === 4) {
                alertClass = "alert-danger";
                guideText = "④ 우측 문양표에서 ③의 결과에 적힌 이모지를 머릿속에 각인하세요!";
            }
            instructionBox.className = `alert ${alertClass} shadow-sm fw-bold mb-4`;
            instructionBox.innerHTML = `<i class="bi bi-magic me-2 text-dark"></i> ${guideText}`;

            // 3. 입체 구슬 캐릭터 및 하이라이팅 처리
            if (revealed) {
                magicSphere.innerHTML = targetEmoji;
                magicSphere.classList.add("revealed");
            } else {
                magicSphere.innerHTML = "❓";
                magicSphere.classList.remove("revealed");
            }

            // 4. 10x10 매칭표 그리드 빌드
            const gridContainer = document.getElementById("emojiGrid");
            gridContainer.innerHTML = "";

            for (let i = 0; i < 100; i++) {
                const item = document.createElement("div");
                item.className = "grid-item shadow-sm";

                item.innerHTML = `
                    <span class="num">${i}</span>
                    <span class="emoji">${mapping[i]}</span>
                `;
                gridContainer.appendChild(item);
            }
        }

        // 앱 기동 및 초기 구동화
        document.addEventListener("DOMContentLoaded", () => {
            initGame();
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
